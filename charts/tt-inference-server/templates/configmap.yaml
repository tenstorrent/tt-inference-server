{{- include "tt-inference-server.validateValues" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tt-inference-server.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tt-inference-server.labels" . | nindent 4 }}
data:
  {{/*
    The media-server backend receives model and device via environment variables.
    The vllm backend receives them as CLI args — no env vars needed here for selection.
  */}}
  {{- if eq .Values.serverType "media" }}
  MODEL: {{ .Values.model | quote }}
  DEVICE: {{ .Values.device | quote }}
  CACHE_ROOT: "/home/container_app_user/cache_root"
  {{- end }}
  {{- range .Values.extraEnv }}
  {{- if .value }}
  {{ .name }}: {{ .value | quote }}
  {{- end }}
  {{- end }}
