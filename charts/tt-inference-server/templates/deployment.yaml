{{- include "tt-inference-server.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tt-inference-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tt-inference-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tt-inference-server.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{ .Values.updateStrategy.type }}
  template:
    metadata:
      labels:
        {{- include "tt-inference-server.selectorLabels" . | nindent 8 }}
      annotations:
        {{- /*
          Rolling restart whenever ConfigMap or Secret content changes.
          This ensures the running pod always reflects the declared configuration.
        */}}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      hostIPC: {{ .Values.hostIPC }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: fix-cache-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /cache"]
          volumeMounts:
            - name: cache
              mountPath: /cache
      containers:
        - name: inference-server
          image: {{ include "tt-inference-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if eq .Values.serverType "vllm" }}
          args:
            - "--model"
            - {{ .Values.model | quote }}
            - "--tt-device"
            - {{ .Values.device | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: {{ .Values.service.protocol }}
          envFrom:
            - configMapRef:
                name: {{ include "tt-inference-server.configmapName" . }}
            - secretRef:
                name: {{ include "tt-inference-server.secretName" . }}
          {{- with .Values.extraEnv }}
          {{- /*
            Items with valueFrom (e.g. secretKeyRef) can't go into a ConfigMap,
            so they are injected directly here.
          */}}
          env:
            {{- range . }}
            {{- if .valueFrom }}
            - name: {{ .name }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
            {{- end }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: cache
              mountPath: /home/container_app_user/cache_root
            - name: tenstorrent
              mountPath: /dev/tenstorrent
            - name: hugepages-1g
              mountPath: /dev/hugepages-1G
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
      volumes:
        - name: cache
          hostPath:
            path: {{ include "tt-inference-server.cacheHostPath" . }}
            type: DirectoryOrCreate
        - name: tenstorrent
          hostPath:
            path: /dev/tenstorrent
            type: Directory
        - name: hugepages-1g
          hostPath:
            path: /dev/hugepages-1G
            type: Directory
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
