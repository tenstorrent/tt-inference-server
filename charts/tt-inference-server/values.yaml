# ---------------------------------------------------------------------------
# Required at install time:
#   helm install my-model ./charts/tt-inference-server-v2 \
#     --set model="Llama-3.1-8B-Instruct" \
#     --set device=galaxy \
#     --set hfToken="hf_xxx"
# ---------------------------------------------------------------------------

# -- Model name. Must match a key under `models`. Required at install time.
model: ""
# -- Device name. Must match a key under `models.<model>`. Required at install time.
device: ""
# -- HuggingFace token. Required for gated or private model weights. Injected as `HF_TOKEN`.
hfToken: ""

# -- Overrides the chart-name component of generated resource names.
nameOverride: ""
# -- Fully overrides the resource name prefix.
fullnameOverride: ""

cache:
  # -- Override the host path used for the cache volume. Defaults to `/opt/cache/<model>-<device>` when empty.
  hostPath: ""

# ---------------------------------------------------------------------------
# Defaults — merged with (and overridden by) per-model config below.
# ---------------------------------------------------------------------------
defaults:
  # -- Server backend. `vllm` for LLMs, `media` for tt-media-server. Overridden per model.
  serverType: vllm
  # -- Number of Deployment replicas. Effective maximum is constrained to the node count by `podAntiAffinity`.
  replicaCount: 1
  # -- Deployment `progressDeadlineSeconds`. Raised to accommodate long model warmup times.
  progressDeadlineSeconds: 3600
  # -- Deployment update strategy. `maxSurge: 0` keeps single-node upgrades from hanging under `podAntiAffinity`.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  # -- Extra annotations applied to the pod template.
  podAnnotations: {}
  # -- Pod-level `securityContext`.
  podSecurityContext: {}
  image:
    # -- Container image pull policy.
    pullPolicy: IfNotPresent
    # -- Image pull secrets for private registries.
    pullSecrets: []
  service:
    # -- Kubernetes Service type.
    type: ClusterIP
    # -- Service port exposed inside the cluster.
    port: 8000
    # -- Container target port; must match the inference server's listen port.
    targetPort: 8000
    # -- Annotations applied to the Service.
    annotations: {}
  resources:
    limits:
      # -- CPU limit.
      cpu: "8"
      # -- Memory limit. Overridden per model.
      memory: 128Gi
      # -- Hugepage (1Gi) limit.
      hugepages-1Gi: 32Gi
    requests:
      # -- CPU request.
      cpu: "6"
      # -- Memory request. Overridden per model.
      memory: 64Gi
      # -- Hugepage (1Gi) request.
      hugepages-1Gi: 32Gi
  probes:
    liveness:
      # -- Enable the liveness probe.
      enabled: true
      # -- HTTP path for the liveness probe. vLLM uses `/v1/models`, media-server uses `/tt-liveness`.
      path: /v1/models
      # -- Seconds before liveness checks start. Tuned per model for warmup time.
      initialDelaySeconds: 2400
    readiness:
      # -- Enable the readiness probe.
      enabled: true
      # -- HTTP path for the readiness probe.
      path: /health
      # -- Seconds before readiness checks start. Tuned per model for warmup time.
      initialDelaySeconds: 2400
  # -- Node selector applied to the pod.
  nodeSelector: {}
  # -- Tolerations applied to the pod.
  tolerations: []
  # -- Pod affinity rules. When non-empty, replaces the auto-generated `podAntiAffinity` below.
  affinity: {}
  podAntiAffinity:
    # -- Enable the default anti-affinity rule that enforces 1:1 Pod:Node allocation.
    enabled: true
    # -- Topology key for anti-affinity. `kubernetes.io/hostname` enforces one pod per node.
    topologyKey: kubernetes.io/hostname
  # -- Additional environment variables. Items take the form `{name, value}` or `{name, valueFrom}`.
  extraEnv: []

# ---------------------------------------------------------------------------
# Per-model configuration — keyed by model name then device.
# Only fields that differ from defaults need to be specified.
# ---------------------------------------------------------------------------

