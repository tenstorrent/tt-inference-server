# ---------------------------------------------------------------------------
# Required at install time:
#   helm install my-model ./charts/tt-inference-server-v2 \
#     --set model="Llama-3.1-8B-Instruct" \
#     --set device=galaxy \
#     --set hfToken="hf_xxx"
# ---------------------------------------------------------------------------

model: ""
device: ""
hfToken: ""

nameOverride: ""
fullnameOverride: ""

# Optional: override the cache host path (defaults to /opt/cache/<model>-<device>)
cache:
  hostPath: ""

# ---------------------------------------------------------------------------
# Defaults — merged with (and overridden by) per-model config below.
# ---------------------------------------------------------------------------
defaults:
  serverType: vllm
  replicaCount: 1
  progressDeadlineSeconds: 3600
  podAnnotations: {}
  podSecurityContext: {}
  image:
    pullPolicy: IfNotPresent
    pullSecrets: []
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    annotations: {}
  resources:
    limits:
      cpu: "8"
      memory: 128Gi
      hugepages-1Gi: 32Gi
    requests:
      cpu: "6"
      memory: 64Gi
      hugepages-1Gi: 32Gi
  probes:
    liveness:
      enabled: true
      path: /v1/models
      initialDelaySeconds: 2400
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 2400
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# ---------------------------------------------------------------------------
# Per-model configuration — keyed by model name then device.
# Only fields that differ from defaults need to be specified.
# ---------------------------------------------------------------------------
