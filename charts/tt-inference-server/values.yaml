# ---------------------------------------------------------------------------
# Required at install time:
#   helm install my-model ./charts/tt-inference-server \
#     --set model="Llama-3.1-8B-Instruct" \
#     --set device=galaxy \
#     --set hfToken="hf_xxx"
#
# Optional:
#   --set engine=vllm       # pin engine when a model has multiple
#   --set impl=tt_transformers   # pin impl when a device has multiple
# ---------------------------------------------------------------------------

model: ""
device: ""
engine: ""
impl: ""
hfToken: ""

nameOverride: ""
fullnameOverride: ""

# Optional: override the cache host path (defaults to /opt/cache/<model>-<device>-<impl>)
cache:
  hostPath: ""

# Optional: pre-downloaded HuggingFace cache directory on the host. When set,
# it is mounted read-only at /mnt/hf-cache inside the container, and the
# MODEL_WEIGHTS_DIR (vLLM) and MODEL_WEIGHTS_PATH + DOWNLOAD_WEIGHTS_FROM_SERVICE
# (tt-media-server) env vars are set so each server picks up the name it reads.
hfCacheDir: ""

# ---------------------------------------------------------------------------
# Defaults — merged with (and overridden by) per-model config below.
# ---------------------------------------------------------------------------
defaults:
  replicaCount: 1
  progressDeadlineSeconds: 3600
  podAnnotations: {}
  podSecurityContext: {}
  image:
    pullPolicy: IfNotPresent
    pullSecrets: []
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    annotations: {}
  resources:
    limits:
#      cpu: "8"
#      memory: 480Gi #~90% of RAM available on Galaxy servers
      hugepages-1Gi: 32Gi
    requests:
      cpu: "6"
      memory: 64Gi
      hugepages-1Gi: 32Gi
  probes:
    liveness:
      enabled: true
      path: /v1/models
      initialDelaySeconds: 2400
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 2400
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# ---------------------------------------------------------------------------
# Per-model configuration — keyed by model -> engine -> device -> impl.
# Populated by `python -m workflows.helm_generator` from the
# ModelSpec catalog. Hand edits to leaf values are preserved across re-runs;
# the generator only overwrites the keys it owns.
# ---------------------------------------------------------------------------
