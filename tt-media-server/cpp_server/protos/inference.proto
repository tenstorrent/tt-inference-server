syntax = "proto2";

package inference;

service Inference {
  rpc Generate(GenerateRequest) returns (stream TokenChunk);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message SamplingParams {
  optional float temperature = 1;
  optional float top_p = 2;
  optional uint32 top_k = 3;
  optional uint32 max_tokens = 4;
}

message GenerateRequest {
  required string model = 1;
  repeated uint32 token_ids = 2;
  optional uint32 max_tokens = 3;
  optional SamplingParams sampling_params = 4;
}

message TokenChunk {
  repeated uint32 token_ids = 1;
  optional string finish_reason = 2;
}

message HealthRequest {}

message HealthResponse {
  required bool ready = 1;
}
