# Dev Kafka broker config for cpp_server.
#
# Mounted into apache/kafka:4.0.0 at /mnt/shared/config/server.properties.
# The image's KafkaDockerWrapper uses the mounted file as the SOLE source of
# truth for server.properties (it does NOT merge with the image's own
# defaults), so every property the broker needs must be declared here.
#
# Layout: single-node KRaft, combined broker + controller, PLAINTEXT only.
# Clients reach the broker through the host's published port.

# --- KRaft node identity & roles --------------------------------------------
process.roles=broker,controller
node.id=1
# Single-voter quorum: this node votes for itself on its own controller port.
# `localhost` is correct -- controller-to-controller traffic stays inside the
# broker process namespace, NOT on the docker network.
controller.quorum.voters=1@localhost:9093

# --- Listeners ---------------------------------------------------------------
# Bind:   broker on 9092 (clients), controller on 9093 (Raft quorum)
listeners=PLAINTEXT://:9092,CONTROLLER://:9093
# dev-kafka.sh overrides this with KAFKA_ADVERTISED_HOST.
advertised.listeners=PLAINTEXT://10.32.89.65:9092
# Which listener brokers use to talk to each other (combined mode: same as
# client listener).
inter.broker.listener.name=PLAINTEXT
controller.listener.names=CONTROLLER
# Both listeners are unauthenticated TCP.
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

# --- Storage -----------------------------------------------------------------
log.dirs=/tmp/kraft-combined-logs

# --- Defaults appropriate for a single-broker dev cluster -------------------
# All internal topics live on one broker, so RF must be 1; mirror that for any
# topic auto-created by clients.
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
num.partitions=1
