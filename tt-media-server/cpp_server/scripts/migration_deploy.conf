#
# Config for deploy_migration_workers.sh — the stable, table-coupled settings
# that rarely change between runs. The deploy sources this before parsing flags,
# so any --flag on the command line still overrides what's set here.
#
# All paths must resolve to the SAME file on every worker host — use the
# NFS-shared /data path so building/placing once on the lead is enough.

# ---------------------------------------------------------------------------
# REQUIRED: the KV tables the real worker migrates.
#
# These are produced by the model runner (tt-llm-engine export_to_protobuf_file,
# default /tmp/*.pb) or a synthetic generator (make_test_table). bringup needed
# none because it moved nothing; the real data plane needs the layout, so these
# are the one irreducible input.
#   - prefill loads PREFILL_TABLE; the one DECODE_TABLE arrives once via control
#     TABLE_EXCHANGE with a decode peer (#4295). File still used as fallback if
#     a worker has no peers.
#   - every decode loads DECODE_TABLE and filters to its own --host tag; replies
#     to TABLE_EXCHANGE with that blob over the control channel at bring-up
# ---------------------------------------------------------------------------
PREFILL_TABLE="/data/${USER}/tables/prefill_kv_chunk_table.pb"
DECODE_TABLE="/data/${USER}/tables/decoder_kv_table.pb"

# ---------------------------------------------------------------------------
# OPTIONAL: FabricNode -> UMD chip map file shared by all workers.
# Each line contains 'mesh chip umd'. TRANSFER-plane only — leave UNSET for
# discovery-only e2e.
#
# By default, deploy mounts the file and passes --device-map to every worker.
# Set ENGINE_HANDOFF_PORT to a nonzero port to push the map over localhost via
# engine_handoff_sender after startup.
# ---------------------------------------------------------------------------
# DEVICE_MAP="/data/${USER}/tables/device-map.txt"
# ENGINE_HANDOFF_PORT=18700

# ---------------------------------------------------------------------------
# OPTIONAL: table host tags (fabric_node_host), aligned position-for-position
# with --prefill-hosts / --decode-hosts. Each tag is used verbatim as the
# worker's --name (discovery key), --host (table slice it owns), and as a --peer
# key, so they MUST match the tables' fabric_node_host exactly.
#
# Leave unset to default to logical prefill-<i> / decode-<i> — correct only if
# your tables were generated with those tags. For real model-runner tables the
# tags are whatever the runner stamped, so list them here.
# ---------------------------------------------------------------------------
# PREFILL_TAGS="prefill-0"
# DECODE_TAGS="host-1c81812a,host-2b90a3f1,host-3c..."

# ---------------------------------------------------------------------------
# OPTIONAL: per-worker peer override. A worker is just a migration worker with a
# peer list, independent of role — this lets you hand ANY worker its own peers,
# keyed by tag, overriding the role default (a prefill peers with every decode; a
# decode peers with nothing). Each peer TAG must match a worker's --name.
#
# Assign ELEMENTS (no `declare`, which would be local to the sourcing function):
#   WORKER_PEERS[prefill-0]="decode-0,decode-2"   # only these two, not all
#   WORKER_PEERS[decode-0]="prefill-0"            # give a decode a peer too
# Only the peer's owner ACTS on it today (prefill opens control channels; a
# decode resolves + holds). Leave unset for the automatic fan-out.
#
# Multi-prefill constraint: control TCP multi-accepts, but each prefill has its
# own Kafka group (broadcast), so shared decode peers are still unsafe. Default
# all-to-all is only safe with one prefill. With NUM_PREFILL>1 you MUST partition
# decode peers so each decode appears in at most one prefill's list (deploy
# asserts this), e.g.
#   WORKER_PEERS[prefill-0]="decode-0,decode-2"
#   WORKER_PEERS[prefill-1]="decode-1,decode-3"
# ---------------------------------------------------------------------------
# WORKER_PEERS[prefill-0]="decode-0,decode-1"

# ---------------------------------------------------------------------------
# OPTIONAL: KV control-plane port. Each decode binds its control server on this
# port and publishes it to the metadata service as kv_control/<tag> ->
# host:CONTROL_PORT; prefill then discovers the full host:port from metadata, so
# this value is only the fallback for a peer that hasn't published yet. One
# worker per host means every worker can share the one port. Defaults to 18650.
# ---------------------------------------------------------------------------
# CONTROL_PORT="18650"

# ---------------------------------------------------------------------------
# OPTIONAL: container name. Set this when workers run inside a per-box container
# via a docker-exec --worker-bin wrapper (the exabox layout). The worker then
# runs as root in the container, so the deploy's sweep/teardown kill it with
# `docker exec <CONTAINER> pkill` instead of a host-side pkill (which can't touch
# a root-in-container process and would leave stale workers + squatted ports).
# The same name is passed to the wrapper as CTR, so it's the single source of
# truth. Leave unset for bare-host or run-inside-container deploys.
# ---------------------------------------------------------------------------
# CONTAINER="tt-dev"
