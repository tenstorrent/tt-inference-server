global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Recording + alerting rules. Matched glob; safe when the directory is empty
# or absent (Prometheus logs a notice but keeps running).
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "tt_media_server"
    # TARGET and SERVICE are substituted at container startup by docker-compose
    # (sed). Set SERVER_TARGET=<container-name>:<port> and SERVER_SERVICE=<name>
    # (e.g. "python" or "cpp") when running docker compose. SERVER_SERVICE
    # defaults to "cpp" for backwards compatibility with the original setup.
    static_configs:
      - targets:
          - "__SERVER_TARGET__"
        labels:
          instance: "tt_media_server"
          service: "__SERVER_SERVICE__"
          language: "__SERVER_SERVICE__"
    metrics_path: /metrics
    scheme: http
    scrape_timeout: 4s

  # Host process metrics (CPU / memory / threads / fds per binary).
  # Exposed by the process-exporter service on the monitoring network.
  - job_name: "tt_processes"
    static_configs:
      - targets:
          - "process-exporter:9256"
        labels:
          instance: "tt_media_server_host"
    metrics_path: /metrics
    scheme: http
    scrape_timeout: 4s
