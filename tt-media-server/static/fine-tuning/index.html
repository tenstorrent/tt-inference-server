<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine-Tuning Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
    <style>
        body { max-width: 1800px; margin: 0 auto; padding: 1rem; font-size: 14px; }
        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
        .left-panel, .right-panel { min-width: 0; }
        .right-panel { }
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        h3 { font-size: 1.1rem; }
        h4 { font-size: 1rem; }
        fieldset {
            margin-bottom: 0.75rem;
            padding: 0.5rem 0.75rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            background: #f9fafb;
        }
        fieldset legend {
            font-size: 1rem;
            font-weight: 700;
            padding: 0 0.5rem;
            color: #333;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem 0.75rem; }
        .form-grid label { margin-bottom: 0; font-size: 0.85rem; }
        input, select { padding: 0.85rem 0.5rem; font-size: 0.85rem; }
        button { padding: 0.4rem 1rem; font-size: 0.85rem; }
        table { font-size: 0.7rem; }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .right-panel { max-height: none; }
        }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 600; color: #fff;
        }
        .badge-queued, .badge-cancelling { background: #e67e22; }
        .badge-in_progress { background: #27ae60; }
        .badge-completed { background: #2980b9; }
        .badge-failed { background: #c0392b; }
        .badge-cancelled { background: #7f8c8d; }

        #jobs-table tbody tr { cursor: pointer; }
        #jobs-table tbody tr:hover td { background: rgba(0,0,0,0.04); }
        #jobs-table tbody tr.selected td { background: rgba(0,100,200,0.08); }

        #job-detail { margin-top: 1.5rem; border-top: 2px solid #ccc; padding-top: 1rem; }
        #detail-meta { columns: 2; }
        #detail-meta dt { font-weight: 600; margin-top: 0.3rem; break-after: avoid; }
        #detail-meta dd { margin-left: 0; margin-bottom: 0.3rem; }

        .error-msg { color: #c0392b; font-weight: 600; margin-top: 0.5rem; }
        .success-msg { color: #27ae60; font-weight: 600; margin-top: 0.5rem; }
        #model-info { font-size: 0.9rem; color: #555; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>Fine-Tuning Dashboard</h1>
    <p id="info-text">Loading model and dataset info...</p>

    <div class="layout">
        <div class="left-panel">
            <form id="job-form">
                <fieldset>
                    <legend>Model</legend>
                    <div class="form-grid">
                        <label>Model
                            <select id="model_select"></select>
                        </label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Dataset</legend>
                    <div class="form-grid">
                        <label>Dataset
                            <select id="dataset_loader"></select>
                        </label>
                        <label>Max Sequence Length
                            <input type="number" id="dataset_max_sequence_length" value="32" min="1">
                        </label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Training</legend>
                    <div class="form-grid">
                        <label>Batch Size
                            <input type="number" id="batch_size" value="4" min="1">
                        </label>
                        <label>Learning Rate
                            <input type="text" id="learning_rate" value="6e-5">
                        </label>
                        <label>Epochs
                            <input type="number" id="num_epochs" value="1" min="1">
                        </label>
                        <label>Validation Steps Freq
                            <input type="number" id="val_steps_freq" value="50" min="1">
                        </label>
                        <label>Log Steps Freq
                            <input type="number" id="steps_freq" value="10" min="1">
                        </label>
                        <label>Dtype
                            <select id="dtype">
                                <option value="torch.bfloat16">torch.bfloat16</option>
                                <option value="torch.float32">torch.float32</option>
                            </select>
                        </label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>LoRA</legend>
                    <div class="form-grid">
                        <label>Rank (r)
                            <input type="number" id="lora_r" value="4" min="1">
                        </label>
                        <label>Alpha
                            <input type="number" id="lora_alpha" value="8" min="1">
                        </label>
                        <label>Target Modules (comma-separated)
                            <input type="text" id="lora_target_modules" value="q_proj, v_proj">
                        </label>
                        <label>Task Type
                            <select id="lora_task_type">
                                <option value="CAUSAL_LM">CAUSAL_LM</option>
                            </select>
                        </label>
                    </div>
                </fieldset>

                <button type="submit">Submit Job</button>
                <span id="form-status"></span>
            </form>
        </div>

        <div class="right-panel">
            <h2>Jobs</h2>
            <table id="jobs-table">
                <thead>
                    <tr><th>Job ID</th><th>Model</th><th>Status</th><th>Created</th></tr>
                </thead>
                <tbody></tbody>
            </table>

            <div id="job-detail" hidden>
                <h3>Job: <code id="detail-id"></code></h3>
                <dl id="detail-meta"></dl>
                <button id="cancel-btn" hidden>Cancel Job</button>
                
                <div id="metrics-section">
                    <h4 id="metrics-heading">No metrics to show</h4>
                    <canvas id="metrics-chart" width="1200" height="500" style="width:100%; background:#fff; border:1px solid #ddd; border-radius:4px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
