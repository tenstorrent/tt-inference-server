[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Don't search parent directories for configuration
norecursedirs = ["*"]
asyncio_mode = "auto"
addopts = "-m 'not live_server'"
markers = [
    "performance: marks tests as performance tests (requires running server)",
    "live_server: marks tests that require a live inference server with Whisper loaded",
]
