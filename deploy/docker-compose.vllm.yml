# Docker Compose for vLLM inference server on Tenstorrent hardware.
#
# Usage (standalone, without run.py):
#   1. Copy .env.example to .env.compose and fill in values
#   2. docker compose --env-file .env.compose -f docker-compose.vllm.yml up -d
#
# Usage (via run.py):
#   python3 run.py --model Llama-3.1-8B-Instruct --workflow server \
#     --tt-device n150 --docker-server --use-compose --no-auth
#
# Note on entrypoint: Release images use docker-entrypoint.sh (root → gosu)
# which does NOT activate the Python venv. The command must include venv
# activation explicitly via bash -c.

services:
  inference-server:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: ${CONTAINER_NAME:-tt-inference-server}
    ipc: host
    devices:
      - /dev/tenstorrent:/dev/tenstorrent
    volumes:
      - /dev/hugepages-1G:/dev/hugepages-1G
      - cache:/home/container_app_user/cache_root
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      CACHE_ROOT: /home/container_app_user/cache_root
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVICE_PORT:-8000}:${SERVICE_PORT:-8000}"
    command:
      - /bin/bash
      - -c
      - >-
        source /home/container_app_user/tt-metal/python_env/bin/activate &&
        exec python run_vllm_api_server.py
        --model ${HF_MODEL:?HF_MODEL is required}
        --tt-device ${TT_DEVICE:?TT_DEVICE is required}
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

volumes:
  cache:
    name: ${CACHE_VOLUME:-tt-inference-cache}
    external: true
