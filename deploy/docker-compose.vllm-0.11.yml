# Docker Compose for vLLM inference server on Tenstorrent hardware.
# Contract era: image versions >= 0.11.0.
#
# Usage (standalone, without run.py):
#   1. Copy .env.example to .env.compose and fill in values
#   2. docker compose --env-file .env.compose -f docker-compose.vllm-0.11.yml up -d --wait
#
# Usage (via run.py):
#   python3 run.py --model Llama-3.1-8B-Instruct --workflow server \
#     --tt-device n150 --docker-server --no-auth
#
# Note on entrypoint: Release images use docker-entrypoint.sh (root → gosu)
# which does NOT activate the Python venv. The command must include venv
# activation explicitly via bash -c.

services:
  inference-server:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: ${CONTAINER_NAME:-tt-inference-server}
    ipc: host
    devices:
      - /dev/tenstorrent:/dev/tenstorrent
    volumes:
      - /dev/hugepages-1G:/dev/hugepages-1G
      - cache:/home/container_app_user/cache_root
      # Host-bound weights are added via overlays/host-weights.yml when
      # setup_config.host_model_weights_mount_dir is set; otherwise the
      # server downloads weights at runtime via HF_TOKEN.
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      CACHE_ROOT: /home/container_app_user/cache_root
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVICE_PORT:-8000}:${SERVICE_PORT:-8000}"
    # The 0.11+ image's ENTRYPOINT is:
    #   ["/bin/bash", "-c", "source $PYTHON_ENV_DIR/bin/activate &&
    #     exec python run_vllm_api_server.py \"$@\"", "--"]
    # so the entrypoint already sources the venv and invokes
    # run_vllm_api_server.py — `command:` here just passes the args via $@.
    # Wrapping in another `bash -c` would double-wrap and the entrypoint
    # would pass the literal `/bin/bash` as argv[1] to argparse.
    command:
      - --model
      - ${HF_MODEL:?HF_MODEL is required}
      - --tt-device
      - ${TT_DEVICE:?TT_DEVICE is required}
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 5400s = 90 min. Matches the server's internal cache-generation timeout
      # (utils.prompt_client logs "🔄 Cache generation in progress — this may
      # take 40-60 minutes for new models"). On first run for a new model,
      # weights download + tt-metal cache generation can run for ~60 min before
      # /health responds. Subsequent runs (cache hit) come up in ~5 min and
      # `compose up --wait` returns immediately on the first successful probe.
      start_period: 5400s

volumes:
  cache:
    name: ${CACHE_VOLUME:-tt-inference-cache}
