# Docker Compose for tt-media-server (image, video, audio, embedding models)
# on Tenstorrent hardware. Also used for forge-based models.
#
# The media server image uses docker-entrypoint.sh which:
# 1. Runs as root to fix CACHE_ROOT volume permissions (group ownership + chmod 2775)
# 2. Drops to container_app_user via gosu
# This is handled by the image's built-in ENTRYPOINT — no special compose config needed.
#
# Usage (standalone, without run.py):
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.media.yml up -d
#
# Usage (via run.py):
#   python3 run.py --model Wan2.2-T2V-A14B-Diffusers --workflow server \
#     --tt-device galaxy --docker-server --use-compose

services:
  inference-server:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: ${CONTAINER_NAME:-tt-media-server}
    ipc: host
    devices:
      - /dev/tenstorrent:/dev/tenstorrent
    volumes:
      - /dev/hugepages-1G:/dev/hugepages-1G
      - ${CACHE_VOLUME:-tt-media-cache}:${CACHE_ROOT:-/home/container_app_user/cache_root}
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      CACHE_ROOT: ${CACHE_ROOT:-/home/container_app_user/cache_root}
      MODEL: ${MODEL:?MODEL is required}
      DEVICE: ${DEVICE:?DEVICE is required}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVICE_PORT:-8000}:${SERVICE_PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
