# Docker Compose for tt-media-server (image, video, audio, embedding models)
# on Tenstorrent hardware. Also used for forge-based models.
# Contract era: image versions >= 0.11.0.
#
# Usage (standalone, without run.py):
#   1. Copy .env.example to .env.compose and fill in values
#   2. docker compose --env-file .env.compose -f docker-compose.media-0.11.yml up -d --wait
#
# Usage (via run.py):
#   python3 run.py --model Wan2.2-T2V-A14B-Diffusers --workflow server \
#     --tt-device galaxy --docker-server

services:
  inference-server:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: ${CONTAINER_NAME:-tt-media-server}
    ipc: host
    devices:
      - /dev/tenstorrent:/dev/tenstorrent
    volumes:
      - /dev/hugepages-1G:/dev/hugepages-1G
      - cache:/home/container_app_user/cache_root
      - ${HOST_MODEL_WEIGHTS:?HOST_MODEL_WEIGHTS is required}:${CONTAINER_MODEL_WEIGHTS:-/mnt/weights}:ro
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      CACHE_ROOT: /home/container_app_user/cache_root
      MODEL: ${MODEL:?MODEL is required}
      DEVICE: ${DEVICE:?DEVICE is required}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVICE_PORT:-8000}:${SERVICE_PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

volumes:
  cache:
    name: ${CACHE_VOLUME:-tt-media-cache}
