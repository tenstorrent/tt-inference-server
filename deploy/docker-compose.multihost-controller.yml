# Docker Compose for multi-host MPI Controller container.
# Runs on rank-0 host. Starts vLLM API server and coordinates MPI processes.
#
# Prerequisites:
#   - Worker containers running on all hosts
#   - SSH config directory at SSH_CONFIG_DIR (generated by orchestrator)
#   - MPI rankfile at MPIRUN_DIR (generated by orchestrator)
#   - Shared storage mounted at SHARED_STORAGE_ROOT on all hosts
#   - Runtime model spec JSON at RUNTIME_MODEL_SPEC_JSON (generated by orchestrator)
#
# Usage (standalone):
#   1. Ensure all workers are running (docker-compose.multihost-worker.yml)
#   2. Generate SSH keys, config, and rankfile
#   3. Set variables in .env or export them
#   4. docker compose -f docker-compose.multihost-controller.yml up -d
#
# Usage (via run.py):
#   Automatically managed by the MultiHostOrchestrator

services:
  controller:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: ${CONTAINER_NAME:-tt-controller}
    network_mode: host
    pid: host
    ipc: host
    user: root
    entrypoint: /usr/local/bin/multihost_entrypoint.sh
    env_file:
      - ${ENV_FILE:-.env}
    devices:
      - /dev/tenstorrent:/dev/tenstorrent
    volumes:
      - /dev/hugepages-1G:/dev/hugepages-1G
      - ${SSH_CONFIG_DIR:?SSH_CONFIG_DIR is required}:/tmp/ssh_config:ro
      - ${MPIRUN_DIR:?MPIRUN_DIR is required}:/etc/mpirun:ro
      - ${SHARED_STORAGE_ROOT:?SHARED_STORAGE_ROOT is required}:${SHARED_STORAGE_ROOT}
      - ${RUNTIME_MODEL_SPEC_JSON:?RUNTIME_MODEL_SPEC_JSON is required}:/tmp/runtime_model_spec.json:ro
      - ${CACHE_VOLUME:-tt-inference-cache}:${CACHE_ROOT:-/home/container_app_user/cache_root}
    environment:
      MULTIHOST_ROLE: controller
      SSH_CONFIG_SRC: /tmp/ssh_config
      MESH_DEVICE: ${MESH_DEVICE:?MESH_DEVICE is required}
      VLLM_TARGET_DEVICE: tt
      NCCL_SOCKET_IFNAME: ${MPI_INTERFACE:?MPI_INTERFACE is required}
      ETH: ${MPI_INTERFACE}
      HOSTS: ${MULTIHOST_HOSTS:?MULTIHOST_HOSTS is required}
      RUNTIME_MODEL_SPEC_JSON_PATH: /tmp/runtime_model_spec.json
    command:
      - python
      - run_vllm_api_server.py
      - --model
      - ${HF_MODEL:?HF_MODEL is required}
      - --tt-device
      - ${TT_DEVICE:?TT_DEVICE is required}
    restart: unless-stopped
