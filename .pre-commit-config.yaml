repos:
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v19.1.4
  hooks:
    - id: clang-format
      name: clang-format (cpp_server)
      entry: git-clang-format
      require_serial: true
      files: ^tt-media-server/cpp_server/
      types_or: [c++, c]
      args: ["--style=file"]
- repo: local
  hooks:
    # Run the linter.
    - id: ruff
      name: ruff
      entry: bash -c 'source .pre-commit/bin/activate && ruff check "$@"' --
      language: system
      types: [python]
    # Run the formatter.
    - id: ruff-format
      name: ruff-format
      entry: bash -c 'source .pre-commit/bin/activate && ruff format "$@"' --
      language: system
      types: [python]

- repo: local
  hooks:
    - id: pytest
      name: pytest
      entry: bash -c 'source .pre-commit/bin/activate && pytest -p no:warnings'
      language: system
      pass_filenames: false
      always_run: true
