name: Test Gate
on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
  merge_group:

# Cancel in-flight runs on a PR when its head advances, so we don't keep three
# xlarge bench jobs alive per stale commit; merge_group and workflow_dispatch
# runs are never cancelled.
concurrency:
  group: test-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  detect-changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-test: ${{ steps.filter.outputs.code }}
      cpp-server: ${{ steps.filter.outputs.cpp_server }}
      prefill-gateway: ${{ steps.filter.outputs.prefill_gateway }}
      media-server-deps: ${{ steps.filter.outputs.media_server_deps }}
      charts: ${{ steps.filter.outputs.charts }}
      helm-inputs: ${{ steps.filter.outputs.helm_inputs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**.py'
              - '**/requirements*.txt'
              - 'pyproject.toml'
              - '.github/workflows/*.yml'
            cpp_server:
              - 'tt-media-server/cpp_server/**'
            prefill_gateway:
              - 'tt-media-server/prefill_gateway/**'
            media_server_deps:
              - 'tt-media-server/requirements.txt'
              - 'tt-media-server/uv-overrides.txt'
              - 'tt-media-server/fix_dependencies.sh'
              - 'tt-media-server/Dockerfile*'
            charts:
              - 'charts/**'
            helm_inputs:
              - 'workflows/model_spec.py'
              - 'workflows/helm_generator/**'
              - 'charts/tt-inference-server/values.yaml'
              - 'tests/test_helm_generator/test_values_in_sync.py'

  lint:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should-test == 'true' }}
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: python -m pip install ruff==0.15.0

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  verify-media-server-install:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.media-server-deps == 'true' }}
    name: Verify Media Server Dep Install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tt-media-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install media-server requirements (strict, no fallback)
        # Mirrors tt-media-server/Dockerfile, minus its `|| (grep -v pyluwen ...)`
        # fallback — that fallback masks resolver failures this gate must catch.
        # The numpy<2 constraint mimics tt-metal's pin so removing uv-overrides.txt's
        # numpy line fails CI here, before tt-metal's C extensions would crash on
        # numpy 2 at runtime in docker.
        run: |
          uv venv
          echo 'numpy>=1.24.4,<2' > tt-metal-pins.txt
          uv pip install \
            --constraint tt-metal-pins.txt \
            --index-strategy unsafe-best-match \
            --overrides uv-overrides.txt \
            -r requirements.txt

      - name: Run fix_dependencies.sh
        # Validates the post-install CPU-torch swap-in still resolves.
        run: |
          chmod +x fix_dependencies.sh
          ./fix_dependencies.sh

  manage-docker-build-reminder:
    needs: detect-changes
    if: ${{ github.event_name == 'pull_request' }}
    name: Manage docker build reminder comment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      # Reminds PR authors to run tt-shield's docker build before merge when
      # docker-related files change. Posts at most once per PR; removes itself
      # if all docker changes are later reverted.
      - name: Create or remove sticky reminder
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          SHOULD_HAVE_COMMENT: ${{ needs.detect-changes.outputs.media-server-deps }}
        with:
          script: |
            const shouldHave = process.env.SHOULD_HAVE_COMMENT === 'true';
            const pr = context.payload.pull_request;
            const isFromFork = pr.head.repo.full_name !== pr.base.repo.full_name;
            const ref = isFromFork ? pr.head.sha : pr.head.ref;
            const refLabel = isFromFork ? 'commit SHA' : 'branch name';
            const marker = '<!-- docker-build-reminder -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (shouldHave) {
              if (existing) {
                core.info('Reminder already present; leaving it untouched.');
                return;
              }
              const body = [
                marker,
                '## Docker build sanity check needed',
                '',
                'This PR touches docker-related files (`Dockerfile*`, `requirements.txt`,',
                '`uv-overrides.txt`, or `fix_dependencies.sh`). The pre-merge',
                '`Verify Media Server Dep Install` job catches install-resolution',
                'regressions but does **not** build the actual docker image.',
                '',
                "Before merging, please run [tt-shield's Build Inference Server workflow]",
                '(https://github.com/tenstorrent/tt-shield/actions/workflows/on-dispatch-build-media-server.yml)',
                'with these inputs:',
                '',
                '| Input | Value |',
                '|---|---|',
                '| `inference-server-type` | `media-inference-server` |',
                `| \`inference-server-git-ref\` | \`${ref}\` (${refLabel}) |`,
                '| `tt-metal-git-ref` | leave default (`main`) |',
                '',
                'Confirm the run succeeds and post the run link as a comment for reviewers.',
              ].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Reminder created.');
            } else if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
              core.info('Docker changes reverted; reminder deleted.');
            } else {
              core.info('No docker changes and no reminder; nothing to do.');
            }

  unit-tests-main:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should-test == 'true' }}
    name: Unit Tests (tt-inference-server)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/tt-media-server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            tt-media-server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r tt-media-server/requirements.txt

      - name: Run tt-inference-server tests
        run: |
          echo "Running tests from tests/ directory..."
          set +e
          pytest tests/ -v --tb=short --continue-on-collection-errors > main_test_output.txt 2>&1
          MAIN_EXIT_CODE=$?
          set -e
          cat main_test_output.txt
          echo "$MAIN_EXIT_CODE" > main_exit_code.txt

      - name: Upload main test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-test-output
          path: |
            main_test_output.txt
            main_exit_code.txt
          retention-days: 1
          if-no-files-found: warn

      - name: Fail if main tests failed
        if: always()
        run: exit "$(cat main_exit_code.txt 2>/dev/null || echo 1)"

  unit-tests-media:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should-test == 'true' }}
    name: Unit Tests (tt-media-server)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/tt-media-server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            tt-media-server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r tt-media-server/requirements.txt
          python -m pip install pytest-cov

      - name: Run tt-media-server tests
        env:
          HF_TOKEN: ""
          MODEL: ""
          JWT_SECRET: ""
        run: |
          echo "Running tests from tt-media-server/tests/"
          # Run from repo root so coverage.xml has paths like "tt-media-server/..."
          # This makes paths match git diff output for diff-cover.
          set +e
          pytest tt-media-server/tests/ \
            --ignore=tt-media-server/performance_tests/ \
            --cov=tt-media-server \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v --tb=short --continue-on-collection-errors > media_test_output.txt 2>&1
          MEDIA_EXIT_CODE=$?
          set -e
          cat media_test_output.txt
          echo "$MEDIA_EXIT_CODE" > media_exit_code.txt

      - name: Upload media test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-test-output
          path: |
            media_test_output.txt
            media_exit_code.txt
          retention-days: 1
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage.xml
          retention-days: 1
          if-no-files-found: warn

      - name: Fail if media tests failed
        if: always()
        run: exit "$(cat media_exit_code.txt 2>/dev/null || echo 1)"

  unit-tests-summary:
    needs: [detect-changes, unit-tests-main, unit-tests-media]
    if: ${{ always() && needs.detect-changes.outputs.should-test == 'true' }}
    name: Unit Test Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download main test output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: main-test-output
          path: .

      - name: Download media test output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: media-test-output
          path: .

      - name: Test Results Summary
        run: |
          echo "===== 🧪 Test Results Summary ====="
          echo "===== 🧪 Test Results Summary =====" >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY

          parse_summary() {
            file="$1"
            if [ ! -f "$file" ]; then
              printf "0|0|0|0|0|0|0\n"
              return
            fi
            sline=$(grep -E "==+ .* in [0-9]+(\.[0-9]+)?s" "$file" | tail -n1 || true)
            if [ -z "$sline" ]; then
              sline=$(tail -n 5 "$file" | sed -n '/./,$p' | tail -n 1 || true)
            fi
            extract() {
              echo "$sline" | sed -nE "s/.* ([0-9]+) ${1}.*/\\1/p" || echo "0"
            }
            passed=$(extract "passed"); passed=$(echo "$passed" | tr -dc '0-9'); passed=${passed:-0}
            failed=$(extract "failed"); failed=$(echo "$failed" | tr -dc '0-9'); failed=${failed:-0}
            skipped=$(extract "skipped"); skipped=$(echo "$skipped" | tr -dc '0-9'); skipped=${skipped:-0}
            errors=$(echo "$sline" | sed -nE 's/.* ([0-9]+) errors.*/\1/p' || true)
            if [ -z "$errors" ]; then
              errors=$(echo "$sline" | sed -nE 's/.* ([0-9]+) error.*/\1/p' || true)
            fi
            errors=$(echo "$errors" | tr -dc '0-9'); errors=${errors:-0}
            collection_errors=$(grep -oE "[0-9]+ tests collected / [0-9]+ errors" "$file" 2>/dev/null | sed -nE 's/.*\/ ([0-9]+) errors/\1/p' | tail -n1 || echo "0")
            collection_errors=$(echo "$collection_errors" | tr -dc '0-9'); collection_errors=${collection_errors:-0}
            total_failed=$(( failed + errors + collection_errors ))
            total=$(( passed + skipped + failed + errors + collection_errors ))
            printf "%s|%s|%s|%s|%s|%s|%s\n" "$passed" "$skipped" "$failed" "$errors" "$collection_errors" "$total_failed" "$total"
          }

          MAIN_VALUES=$(parse_summary main_test_output.txt)
          MAIN_PASSED=$(echo "$MAIN_VALUES" | cut -d'|' -f1)
          MAIN_SKIPPED=$(echo "$MAIN_VALUES" | cut -d'|' -f2)
          MAIN_TOTAL_FAILED=$(echo "$MAIN_VALUES" | cut -d'|' -f6)
          MAIN_TOTAL=$(echo "$MAIN_VALUES" | cut -d'|' -f7)

          MEDIA_VALUES=$(parse_summary media_test_output.txt)
          MEDIA_PASSED=$(echo "$MEDIA_VALUES" | cut -d'|' -f1)
          MEDIA_SKIPPED=$(echo "$MEDIA_VALUES" | cut -d'|' -f2)
          MEDIA_TOTAL_FAILED=$(echo "$MEDIA_VALUES" | cut -d'|' -f6)
          MEDIA_TOTAL=$(echo "$MEDIA_VALUES" | cut -d'|' -f7)

          MAIN_EXIT_CODE=$(cat main_exit_code.txt 2>/dev/null || echo 1)
          MEDIA_EXIT_CODE=$(cat media_exit_code.txt 2>/dev/null || echo 1)
          EXIT_ONLY_FAILURES=0
          if [ "$MAIN_EXIT_CODE" -ne 0 ] && [ "$MAIN_TOTAL_FAILED" -eq 0 ]; then
            EXIT_ONLY_FAILURES=$(( EXIT_ONLY_FAILURES + 1 ))
          fi
          if [ "$MEDIA_EXIT_CODE" -ne 0 ] && [ "$MEDIA_TOTAL_FAILED" -eq 0 ]; then
            EXIT_ONLY_FAILURES=$(( EXIT_ONLY_FAILURES + 1 ))
          fi

          TOTAL_TESTS=$(( MAIN_TOTAL + MEDIA_TOTAL ))
          TOTAL_PASSED=$(( MAIN_PASSED + MEDIA_PASSED ))
          TOTAL_SKIPPED=$(( MAIN_SKIPPED + MEDIA_SKIPPED ))
          TOTAL_FAILED=$(( MAIN_TOTAL_FAILED + MEDIA_TOTAL_FAILED + EXIT_ONLY_FAILURES ))

          MAIN_STATUS="✅"
          if [ "$MAIN_TOTAL_FAILED" -gt 0 ] || [ "$MAIN_EXIT_CODE" -ne 0 ]; then
            MAIN_STATUS="❌"
          fi
          MEDIA_STATUS="✅"
          if [ "$MEDIA_TOTAL_FAILED" -gt 0 ] || [ "$MEDIA_EXIT_CODE" -ne 0 ]; then
            MEDIA_STATUS="❌"
          fi
          OVERALL_STATUS="✅"
          [ "$TOTAL_FAILED" -gt 0 ] && OVERALL_STATUS="❌"

          {
            echo "| Component | Total | Passed | Skipped | Failed | Status |"
            echo "|-----------|------:|-------:|--------:|-------:|:------:|"
            echo "| **tt-inference-server** | $MAIN_TOTAL | $MAIN_PASSED | $MAIN_SKIPPED | $MAIN_TOTAL_FAILED | $MAIN_STATUS |"
            echo "| **tt-media-server** | $MEDIA_TOTAL | $MEDIA_PASSED | $MEDIA_SKIPPED | $MEDIA_TOTAL_FAILED | $MEDIA_STATUS |"
            echo "| **Overall** | **$TOTAL_TESTS** | **$TOTAL_PASSED** | **$TOTAL_SKIPPED** | **$TOTAL_FAILED** | $OVERALL_STATUS |"
          } >> $GITHUB_STEP_SUMMARY

          echo "FINAL_TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV
          echo "FINAL_TOTAL_PASSED=$TOTAL_PASSED" >> $GITHUB_ENV
          echo "FINAL_TOTAL_SKIPPED=$TOTAL_SKIPPED" >> $GITHUB_ENV
          echo "FINAL_TOTAL_FAILED=$TOTAL_FAILED" >> $GITHUB_ENV
          echo "FINAL_MAIN_TOTAL=$MAIN_TOTAL" >> $GITHUB_ENV
          echo "FINAL_MAIN_PASSED=$MAIN_PASSED" >> $GITHUB_ENV
          echo "FINAL_MAIN_SKIPPED=$MAIN_SKIPPED" >> $GITHUB_ENV
          echo "FINAL_MAIN_TOTAL_FAILED=$MAIN_TOTAL_FAILED" >> $GITHUB_ENV
          echo "FINAL_MEDIA_TOTAL=$MEDIA_TOTAL" >> $GITHUB_ENV
          echo "FINAL_MEDIA_PASSED=$MEDIA_PASSED" >> $GITHUB_ENV
          echo "FINAL_MEDIA_SKIPPED=$MEDIA_SKIPPED" >> $GITHUB_ENV
          echo "FINAL_MEDIA_TOTAL_FAILED=$MEDIA_TOTAL_FAILED" >> $GITHUB_ENV

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { FINAL_TOTAL_TESTS, FINAL_TOTAL_PASSED, FINAL_TOTAL_SKIPPED, FINAL_TOTAL_FAILED,
                    FINAL_MAIN_TOTAL, FINAL_MAIN_PASSED, FINAL_MAIN_SKIPPED, FINAL_MAIN_TOTAL_FAILED,
                    FINAL_MEDIA_TOTAL, FINAL_MEDIA_PASSED, FINAL_MEDIA_SKIPPED, FINAL_MEDIA_TOTAL_FAILED } = process.env;

            const overallPassed = parseInt(FINAL_TOTAL_FAILED) === 0;
            const statusIcon = overallPassed ? '✅' : '❌';
            const statusText = overallPassed ? 'PASSED' : 'FAILED';
            const commentBody = `## ${statusIcon} Test Results - ${statusText}

            ### Summary
            | Component | Total | Passed | Skipped | Failed | Status |
            |-----------|-------|--------|---------|--------|--------|
            | **tt-inference-server** | ${FINAL_MAIN_TOTAL} | ${FINAL_MAIN_PASSED} | ${FINAL_MAIN_SKIPPED} | ${FINAL_MAIN_TOTAL_FAILED} | ${parseInt(FINAL_MAIN_TOTAL_FAILED) === 0 ? '✅' : '❌'} |
            | **tt-media-server** | ${FINAL_MEDIA_TOTAL} | ${FINAL_MEDIA_PASSED} | ${FINAL_MEDIA_SKIPPED} | ${FINAL_MEDIA_TOTAL_FAILED} | ${parseInt(FINAL_MEDIA_TOTAL_FAILED) === 0 ? '✅' : '❌'} |
            | **Overall** | ${FINAL_TOTAL_TESTS} | ${FINAL_TOTAL_PASSED} | ${FINAL_TOTAL_SKIPPED} | ${FINAL_TOTAL_FAILED} | ${statusIcon} |

            ### Details
            - **Python Version**: ${{ env.PYTHON_VERSION }}
            - **Workflow**: \`${context.workflow}\`
            - **Commit**: \`${context.sha.substring(0, 7)}\`
            - **Run ID**: [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})

            ${overallPassed
              ? '🎉 All tests passed! This PR is ready for review.'
              : '⚠️ Some tests failed. Please review the failing tests before merging.'}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Test Results -')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  llm-streaming-performance:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should-test == 'true' }}
    name: LLM Streaming Performance Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}/tt-media-server
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'tt-media-server/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run LLM Streaming Performance Test
        run: |
          # Run pytest and capture output (visible in job logs via tee)
          pytest performance_tests/test_llm_streaming.py -sv 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          # Extract only the CI report section (between markers) to avoid matching source code
          sed -n '/::CI_REPORT_START::/,/::CI_REPORT_END::/p' test_output.txt > ci_report.txt

          # Parse CI report metrics from the extracted section
          TOKENS=$(grep '^tokens_received=' ci_report.txt | cut -d= -f2 || echo "N/A")
          TOTAL_TIME=$(grep '^total_time_ms=' ci_report.txt | cut -d= -f2 || echo "N/A")
          MEAN_INTERVAL=$(grep '^mean_interval_ms=' ci_report.txt | cut -d= -f2 || echo "N/A")
          THROUGHPUT=$(grep '^throughput_tps=' ci_report.txt | cut -d= -f2 || echo "N/A")
          OVERHEAD=$(grep '^overhead_ms=' ci_report.txt | cut -d= -f2 || echo "N/A")
          THRESHOLD=$(grep '^threshold_ms=' ci_report.txt | cut -d= -f2 || echo "N/A")

          # Determine status
          if [ $TEST_EXIT_CODE -eq 0 ]; then
            STATUS="✅ PASSED"
          else
            STATUS="❌ FAILED"
          fi

          # Write formatted summary
          {
            echo "## 🚀 LLM Streaming Performance Test"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **Status** | $STATUS |"
            echo "| **Tokens Received** | $TOKENS |"
            echo "| **Total Time** | ${TOTAL_TIME}ms |"
            echo "| **Mean Interval** | ${MEAN_INTERVAL}ms |"
            echo "| **Throughput** | ${THROUGHPUT} tokens/s |"
            echo "| **Overhead/Token** | ${OVERHEAD}ms (threshold: ${THRESHOLD}ms) |"
          } >> $GITHUB_STEP_SUMMARY

          # Store exit code for later
          echo "TEST_EXIT_CODE=$TEST_EXIT_CODE" >> $GITHUB_ENV

      - name: Show server logs
        if: always()
        run: |
          echo "=== Server Logs ==="
          if [ -f performance_tests/server.log ]; then
            cat performance_tests/server.log
          else
            echo "No server.log file found"
          fi

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-streaming-server-logs
          path: tt-media-server/performance_tests/server.log
          retention-days: 1
          if-no-files-found: warn

      - name: Check test result
        run: exit ${{ env.TEST_EXIT_CODE }}

  cpp-format-check:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' }}
    name: C++ Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CI_CCACHE: "1"
      CCACHE_DIR: ${{ github.workspace }}/tt-media-server/.cache/ccache
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TT_LLM_ENGINE }}

      - name: Set up C++ CI dependencies
        uses: ./.github/actions/setup-cpp-ci
        with:
          token: ${{ secrets.TT_LLM_ENGINE }}

      - name: Validate OpenAPI spec against registered routes
        run: |
          python3 -m pip install openapi-spec-validator --quiet
          cd cpp_server
          python3 tools/validate_openapi.py

      - name: C++ format check (.clang-format)
        run: |
          cd cpp_server
          if ! find include src tests benchmarks -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) -print0 \
            | xargs -0 -r clang-format-20 --dry-run --Werror >/dev/null 2>&1; then
            echo '::error::Some C++ files are not formatted per .clang-format.'
            echo 'To fix locally, run from repo root:'
            echo '  cd tt-media-server/cpp_server && find include src tests benchmarks -type f \( -name '"'"'*.cpp'"'"' -o -name '"'"'*.h'"'"' -o -name '"'"'*.hpp'"'"' \) -print0 | xargs -0 clang-format-20 -i'
            exit 1
          fi

      - name: C++ lint check (build with clang-tidy)
        run: |
          cd cpp_server
          ./build.sh --clang-tidy --blaze

  prefill-gateway-format-check:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' || needs.detect-changes.outputs.prefill-gateway == 'true' }}
    name: Prefill Gateway Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format-20
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl gnupg ca-certificates
          . /etc/os-release
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/llvm-snapshot.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] https://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-20 main" \
            | sudo tee "/etc/apt/sources.list.d/llvm-toolchain-${VERSION_CODENAME}-20.list" >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format-20

      - name: C++ format check (.clang-format)
        run: |
          if ! find tt-media-server/prefill_gateway/include \
                    tt-media-server/prefill_gateway/src \
                    tt-media-server/prefill_gateway/tests \
               -type f \( -name '*.cpp' -o -name '*.hpp' \) -print0 \
               | xargs -0 -r clang-format-20 --dry-run --Werror >/dev/null 2>&1; then
            echo '::error::Some prefill_gateway files are not formatted per .clang-format.'
            echo 'To fix locally, run from repo root:'
            echo '  find tt-media-server/prefill_gateway/include tt-media-server/prefill_gateway/src tt-media-server/prefill_gateway/tests -type f \( -name '"'"'*.cpp'"'"' -o -name '"'"'*.hpp'"'"' \) -print0 | xargs -0 clang-format-20 -i'
            exit 1
          fi

  cpp-build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' }}
    name: C++ Build & Unit Tests
    # Match the bench runner's image (tenstorrent ARC ubuntu-jammy) so the
    # downstream cpp-server-benchmarks / cpp-server-prefill-decode-split jobs
    # find every shared lib the binary was linked against. Splitting build
    # (ubuntu-latest = noble, newer Python) from bench (jammy, default Python)
    # has produced repeated runtime "missing libfoo.so" failures (libpq5,
    # libpython from the build runner, ...). Same OS image on both sides eliminates the class.
    runs-on: tt-ubuntu-2204-large-stable
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      # The aus2 self-hosted runners auto-inject http(s)_proxy pointing at
      # proxy.restricted-proxy.svc.cluster.local:3128 but do not set no_proxy
      # for loopback. Without this, curl/requests calls to a server we start
      # on 127.0.0.1 (e.g. CancellationE2E's /tt-liveness probe) are routed
      # through the internal proxy, which has no route back and fails every
      # probe, making the server appear to never become ready. GitHub
      # Actions treats env keys as case-insensitive, so we set only the
      # lowercase form (which curl and Python requests both read).
      no_proxy: "localhost,127.0.0.1,::1"
      CI_CCACHE: "1"
      CCACHE_DIR: ${{ github.workspace }}/tt-media-server/.cache/ccache
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TT_LLM_ENGINE }}

      - name: Set up C++ CI dependencies
        uses: ./.github/actions/setup-cpp-ci
        with:
          token: ${{ secrets.TT_LLM_ENGINE }}

      - name: Build C++ server
        run: |
          cd cpp_server
          ./build.sh --blaze
          cd ..

      - name: Run C++ unit tests
        run: |
          cd cpp_server/build
          ctest --output-on-failure
          cd ../..

      - name: Archive C++ build
        run: |
          cd cpp_server
          tar -czf cpp-server-build.tar.gz build tokenizers

      - name: Upload C++ build
        uses: actions/upload-artifact@v4
        with:
          name: cpp-server-build
          path: tt-media-server/cpp_server/cpp-server-build.tar.gz
          retention-days: 1

  cpp-server-benchmarks:
    needs: [detect-changes, cpp-build]
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' }}
    name: C++ Server Benchmarks
    runs-on: tt-ubuntu-2204-xlarge-stable
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}/tt-media-server
      # Loopback must bypass the runner's injected proxy (see cpp-build).
      no_proxy: "localhost,127.0.0.1,::1"
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download C++ build
        uses: actions/download-artifact@v4
        with:
          name: cpp-server-build
          path: tt-media-server/cpp_server

      - name: Set up C++ build artifact
        run: bash cpp_server/scripts/ci/setup_cpp_artifact.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install Python test dependencies
        run: bash cpp_server/scripts/ci/install_bench_client.sh

      # ── Mock backend benchmarks ──────────────────────────────────────
      - name: Start C++ server (mock backend)
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8000 --label "mock backend"
          cd cpp_server/build
          LLM_DEVICE_BACKEND=mock ./tt_media_server_cpp -p 8000 -t 4 > ../../cpp_server_mock.log 2>&1 &
          echo $! > ../../cpp_server.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8000 --pid-file cpp_server.pid --label "mock backend"

      # Pre-warm the Drogon IO thread pool so each thread pays its per-thread
      # tokenizer init cost (#3179) before the measured bench starts. Without
      # this, mean_ttft_ms on the first bench is dominated by the cold-start
      # P99 tail. Concurrency of 16 across 4 IO threads reliably touches every
      # thread.
      - name: Warm up mock backend
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 32 \
            --max-concurrency 16 \
            > /dev/null

      - name: Bench mock backend
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-mock.json" \
            2>&1 | tee bench_mock_output.txt

      # `vllm bench serve` hard-codes stream=True, so cover stream=False with a
      # small smoke test that asserts the response shape (no perf thresholds —
      # the non-streaming path is gated on correctness, not latency).
      - name: Smoke test mock backend (non-streaming)
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: python cpp_server/tests/test_non_streaming_chat.py

      - name: Bench mock backend (structured output - json_object)
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --extra-body '{"response_format": {"type": "json_object"}}' \
            --save-result \
            --result-filename "vllm-bench-structured-output-json-object.json" \
            2>&1 | tee bench_structured_output_json_object.txt

      - name: Bench mock backend (structured output - json_schema)
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --extra-body '{"response_format": {"type": "json_schema", "json_schema": {"name": "person", "strict": true, "schema": {"type": "object", "properties": {"name": {"type": "string"}, "age": {"type": "integer"}, "city": {"type": "string"}}, "required": ["name", "age", "city"], "additionalProperties": false}}}}' \
            --save-result \
            --result-filename "vllm-bench-structured-output-json-schema.json" \
            2>&1 | tee bench_structured_output_json_schema.txt

      - name: Stop mock server
        if: always()
        run: |
          PID="$([ -f cpp_server.pid ] && cat cpp_server.pid || true)"
          [ -n "$PID" ] && kill "$PID" 2>/dev/null || true
          [ -n "$PID" ] && bash cpp_server/scripts/ci/wait_for_command.sh \
            --command "! kill -0 $PID 2>/dev/null" --label "mock backend exit"
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8000 --label "mock backend"

      # ── Mock pipeline backend benchmarks ─────────────────────────────
      - name: Start C++ server (mock_pipeline backend)
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8000 --label "mock_pipeline backend"
          cd cpp_server/build
          LLM_DEVICE_BACKEND=mock_pipeline ./tt_media_server_cpp -p 8000 -t 4 > ../../cpp_server_mock_pipeline.log 2>&1 &
          echo $! > ../../cpp_server.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8000 --pid-file cpp_server.pid --label "mock_pipeline backend"

      - name: Warm up mock_pipeline backend
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --dataset-name random \
            --random-input-len 32 \
            --random-output-len 32 \
            --num-prompts 32 \
            --max-concurrency 16 \
            > /dev/null

      - name: Bench mock_pipeline backend
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --dataset-name random \
            --random-input-len 32\
            --random-output-len 1024\
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-mock-pipeline.json" \
            2>&1 | tee bench_mock_pipeline_output.txt

      - name: Stop mock_pipeline server
        if: always()
        run: |
          PID="$([ -f cpp_server.pid ] && cat cpp_server.pid || true)"
          [ -n "$PID" ] && kill "$PID" 2>/dev/null || true
          [ -n "$PID" ] && bash cpp_server/scripts/ci/wait_for_command.sh \
            --command "! kill -0 $PID 2>/dev/null" --label "mock_pipeline backend exit"
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8000 --label "mock_pipeline backend"

      # ── Check thresholds ─────────────────────────────────────────────
      - name: Check all benchmark thresholds
        run: |
          CONFIG=cpp_server/scripts/ci/vllm_thresholds.json
          CHECK=cpp_server/scripts/ci/check_vllm_result.py
          FAIL=0
          python3 "$CHECK" --config "$CONFIG" --scenario cpp_mock \
            --result vllm-bench-mock.json || FAIL=1
          python3 "$CHECK" --config "$CONFIG" --scenario cpp_structured_json_object \
            --result vllm-bench-structured-output-json-object.json || FAIL=1
          python3 "$CHECK" --config "$CONFIG" --scenario cpp_structured_json_schema \
            --result vllm-bench-structured-output-json-schema.json || FAIL=1
          python3 "$CHECK" --config "$CONFIG" --scenario cpp_mock_pipeline \
            --result vllm-bench-mock-pipeline.json || FAIL=1
          echo "BENCH_FAIL=$FAIL" >> "$GITHUB_ENV"

      # ── Artifacts & logs ─────────────────────────────────────────────
      - name: Show server logs
        if: always()
        run: |
          echo "=== Mock Server Logs ==="
          [ -f cpp_server_mock.log ] && cat cpp_server_mock.log || echo "No log"
          echo ""
          echo "=== Mock Pipeline Server Logs ==="
          [ -f cpp_server_mock_pipeline.log ] && cat cpp_server_mock_pipeline.log || echo "No log"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-server-bench-results
          path: |
            tt-media-server/vllm-bench-mock.json
            tt-media-server/vllm-bench-structured-output-json-object.json
            tt-media-server/vllm-bench-structured-output-json-schema.json
            tt-media-server/vllm-bench-mock-pipeline.json
          retention-days: 1
          if-no-files-found: warn

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-server-bench-logs
          path: |
            tt-media-server/cpp_server_mock.log
            tt-media-server/cpp_server_mock_pipeline.log
          retention-days: 1
          if-no-files-found: warn

      - name: Check benchmark result
        if: always()
        run: exit "${BENCH_FAIL:-0}"

  cpp-server-prefill-decode-split:
    needs: [detect-changes, cpp-build]
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' }}
    name: C++ Server Prefill/Decode Split Test
    runs-on: tt-ubuntu-2204-xlarge-stable
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}/tt-media-server
      # Loopback must bypass the runner's injected proxy (see cpp-build).
      no_proxy: "localhost,127.0.0.1,::1"
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download C++ build
        uses: actions/download-artifact@v4
        with:
          name: cpp-server-build
          path: tt-media-server/cpp_server

      - name: Set up C++ build artifact
        run: bash cpp_server/scripts/ci/setup_cpp_artifact.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install Python test dependencies
        run: bash cpp_server/scripts/ci/install_bench_client.sh

      # ── Round 1a: TCP Decode + Prefill split ─────────────────────────
      - name: "[TCP] Start Decode server (direct split)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --port 9000 --label "TCP direct split decode"
          cd cpp_server/build
          NS=tcp_decode
          SOCKET_TRANSPORT=tcp LLM_MODE=decode SOCKET_HOST=0.0.0.0 SOCKET_PORT=9000 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8001 -t 4 > ../../tcp_decode.log 2>&1 &
          echo $! > ../../tcp_decode.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8001 --pid-file tcp_decode.pid --label "TCP decode server"

      - name: "[TCP] Start Prefill server (direct split)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8002 --label "TCP direct split prefill"
          cd cpp_server/build
          NS=tcp_prefill
          SOCKET_TRANSPORT=tcp LLM_MODE=prefill SOCKET_HOST=127.0.0.1 SOCKET_PORT=9000 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8002 -t 4 > ../../tcp_prefill.log 2>&1 &
          echo $! > ../../tcp_prefill.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8002 --pid-file tcp_prefill.pid --label "TCP prefill server"
          sleep 2

      - name: "[TCP] Run vLLM bench serve against split servers"
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --base-url http://127.0.0.1:8001 \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-split-tcp-result.json" \
            2>&1 | tee bench_split_tcp_output.txt

      - name: "[TCP] Stop split servers"
        if: always()
        run: |
          [ -f tcp_decode.pid ]  && kill $(cat tcp_decode.pid)  2>/dev/null || true
          [ -f tcp_prefill.pid ] && kill $(cat tcp_prefill.pid) 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --port 8002 --port 9000 --label "TCP direct split"

      # ── Round 1b: ZMQ Decode + Prefill split ─────────────────────────
      - name: "[ZMQ] Start Decode server (direct split)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --port 9000 --label "ZMQ direct split decode"
          cd cpp_server/build
          NS=zmq_decode
          SOCKET_TRANSPORT=zmq LLM_MODE=decode SOCKET_HOST=0.0.0.0 SOCKET_PORT=9000 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8001 -t 4 > ../../zmq_decode.log 2>&1 &
          echo $! > ../../zmq_decode.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8001 --pid-file zmq_decode.pid --label "ZMQ decode server"

      - name: "[ZMQ] Start Prefill server (direct split)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8002 --label "ZMQ direct split prefill"
          cd cpp_server/build
          NS=zmq_prefill
          SOCKET_TRANSPORT=zmq LLM_MODE=prefill SOCKET_HOST=127.0.0.1 SOCKET_PORT=9000 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8002 -t 4 > ../../zmq_prefill.log 2>&1 &
          echo $! > ../../zmq_prefill.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8002 --pid-file zmq_prefill.pid --label "ZMQ prefill server"
          sleep 2

      - name: "[ZMQ] Run vLLM bench serve against split servers"
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --base-url http://127.0.0.1:8001 \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-split-zmq-result.json" \
            2>&1 | tee bench_split_zmq_output.txt

      - name: "[ZMQ] Stop split servers"
        if: always()
        run: |
          [ -f zmq_decode.pid ]  && kill $(cat zmq_decode.pid)  2>/dev/null || true
          [ -f zmq_prefill.pid ] && kill $(cat zmq_prefill.pid) 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --port 8002 --port 9000 --label "ZMQ direct split"

      # ── Round 2: mock_prefill_runner + Prefill + Decode split ────────
      - name: Clean shared memory segments
        run: |
          rm -f /dev/shm/tt_ipc_p2c /dev/shm/tt_ipc_c2p 2>/dev/null || true

      - name: Start mock_prefill_runner (rank 0 coordinator)
        run: |
          cd cpp_server
          TT_IPC_SHM_P2C=tt_ipc_p2c \
          TT_IPC_SHM_C2P=tt_ipc_c2p \
          LLM_DEVICE_BACKEND=ttrun \
            python src/runtime/runners/mock_prefill_runner.py \
            > ../mock_prefill_runner.log 2>&1 &
          echo $! > ../mock_prefill_runner.pid
          cd ..
          sleep 2
          if ! kill -0 "$(cat mock_prefill_runner.pid)" 2>/dev/null; then
            echo "ERROR: mock_prefill_runner exited during startup"
            cat mock_prefill_runner.log || true
            exit 1
          fi

      - name: Start Prefill server (mock_prefill_runner round)
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --label "mock_prefill_runner prefill"
          cd cpp_server
          NS=r2_prefill
          TT_IPC_SHM_C2P=tt_ipc_c2p TT_IPC_SHM_P2C=tt_ipc_p2c \
          TT_LOG_LEVEL=debug \
          LLM_MODE=prefill LLM_DEVICE_BACKEND=prefill \
          SOCKET_HOST=127.0.0.1 SOCKET_PORT=9000 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./build/tt_media_server_cpp -p 8001 -t 4 \
            > ../prefill_server_runner.log 2>&1 &
          echo $! > ../prefill_server_runner.pid
          cd ..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8001 --pid-file prefill_server_runner.pid --label "mock_prefill_runner prefill server"

      - name: Start Decode server (mock_prefill_runner round)
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8000 --port 9000 --label "mock_prefill_runner decode"
          cd cpp_server
          NS=r2_decode
          LLM_MODE=decode SOCKET_HOST=0.0.0.0 SOCKET_PORT=9000 \
          TT_LOG_LEVEL=debug \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./build/tt_media_server_cpp -p 8000 -t 4 \
            > ../decode_server_runner.log 2>&1 &
          echo $! > ../decode_server_runner.pid
          cd ..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8000 --pid-file decode_server_runner.pid --label "mock_prefill_runner decode server"

      - name: Verify prefill/decode socket connection
        run: |
          bash cpp_server/scripts/ci/wait_for_liveness.sh \
            --port 8001 \
            --expect '"socket_status":"client:connected"' \
            --pid-file prefill_server_runner.pid \
            --label "mock_prefill_runner prefill socket"
          bash cpp_server/scripts/ci/wait_for_liveness.sh \
            --port 8000 \
            --expect '"socket_status":"server:connected"' \
            --pid-file decode_server_runner.pid \
            --label "mock_prefill_runner decode socket"
          PREFILL_LIVENESS=$(curl -sf "http://127.0.0.1:8001/tt-liveness" 2>/dev/null || true)
          DECODE_LIVENESS=$(curl -sf "http://127.0.0.1:8000/tt-liveness" 2>/dev/null || true)
          echo "Prefill liveness: $PREFILL_LIVENESS"
          echo "Decode liveness:  $DECODE_LIVENESS"
          FAIL=0
          if ! echo "$PREFILL_LIVENESS" | grep -q '"model_ready":true'; then
            echo "ERROR: Prefill server model_ready is not true"
            FAIL=1
          fi
          if ! echo "$PREFILL_LIVENESS" | grep -q '"socket_status":"client:connected"'; then
            echo "ERROR: Prefill server socket_status is not 'client:connected'"
            FAIL=1
          fi
          if ! echo "$DECODE_LIVENESS" | grep -q '"model_ready":true'; then
            echo "ERROR: Decode server model_ready is not true"
            FAIL=1
          fi
          if ! echo "$DECODE_LIVENESS" | grep -q '"socket_status":"server:connected"'; then
            echo "ERROR: Decode server socket_status is not 'server:connected'"
            FAIL=1
          fi
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi

      - name: Run vLLM bench serve against mock_prefill_runner split
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --base-url http://127.0.0.1:8000 \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-split-runner-result.json" \
            2>&1 | tee bench_split_runner_output.txt

      - name: Stop split servers (round 2)
        if: always()
        run: |
          [ -f decode_server_runner.pid ] && kill $(cat decode_server_runner.pid) 2>/dev/null || true
          [ -f prefill_server_runner.pid ] && kill $(cat prefill_server_runner.pid) 2>/dev/null || true
          [ -f mock_prefill_runner.pid ] && kill $(cat mock_prefill_runner.pid) 2>/dev/null || true
          rm -f /dev/shm/tt_ipc_p2c /dev/shm/tt_ipc_c2p 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8000 --port 8001 --port 9000 --label "mock_prefill_runner split"

      - name: Check benchmark thresholds
        run: |
          CONFIG=cpp_server/scripts/ci/vllm_thresholds.json
          CHECK=cpp_server/scripts/ci/check_vllm_result.py
          FAIL=0
          python3 "$CHECK" --config "$CONFIG" --scenario prefill_decode_split_tcp \
            --result vllm-bench-split-tcp-result.json || FAIL=1
          python3 "$CHECK" --config "$CONFIG" --scenario prefill_decode_split_zmq \
            --result vllm-bench-split-zmq-result.json || FAIL=1
          python3 "$CHECK" --config "$CONFIG" --scenario prefill_decode_split_runner \
            --result vllm-bench-split-runner-result.json || FAIL=1
          echo "BENCH_FAIL=$FAIL" >> "$GITHUB_ENV"

      - name: Show server logs
        if: always()
        run: |
          echo "=== Decode Server Logs (TCP round) ==="
          if [ -f tcp_decode.log ]; then
            cat tcp_decode.log
          else
            echo "No tcp_decode.log file found"
          fi
          echo ""
          echo "=== Prefill Server Logs (TCP round) ==="
          if [ -f tcp_prefill.log ]; then
            cat tcp_prefill.log
          else
            echo "No tcp_prefill.log file found"
          fi
          echo ""
          echo "=== Decode Server Logs (ZMQ round) ==="
          if [ -f zmq_decode.log ]; then
            cat zmq_decode.log
          else
            echo "No zmq_decode.log file found"
          fi
          echo ""
          echo "=== Prefill Server Logs (ZMQ round) ==="
          if [ -f zmq_prefill.log ]; then
            cat zmq_prefill.log
          else
            echo "No zmq_prefill.log file found"
          fi
          echo ""
          echo "=== mock_prefill_runner Logs (round 2) ==="
          if [ -f mock_prefill_runner.log ]; then
            cat mock_prefill_runner.log
          else
            echo "No mock_prefill_runner.log file found"
          fi
          echo ""
          echo "=== Prefill Server Logs (round 2) ==="
          if [ -f prefill_server_runner.log ]; then
            cat prefill_server_runner.log
          else
            echo "No prefill_server_runner.log file found"
          fi
          echo ""
          echo "=== Decode Server Logs (round 2) ==="
          if [ -f decode_server_runner.log ]; then
            cat decode_server_runner.log
          else
            echo "No decode_server_runner.log file found"
          fi

      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-server-prefill-decode-split-result
          path: |
            tt-media-server/vllm-bench-split-tcp-result.json
            tt-media-server/vllm-bench-split-zmq-result.json
            tt-media-server/vllm-bench-split-runner-result.json
          retention-days: 1
          if-no-files-found: warn

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-server-prefill-decode-split-logs
          path: |
            tt-media-server/tcp_decode.log
            tt-media-server/tcp_prefill.log
            tt-media-server/zmq_decode.log
            tt-media-server/zmq_prefill.log
            tt-media-server/mock_prefill_runner.log
            tt-media-server/prefill_server_runner.log
            tt-media-server/decode_server_runner.log
          retention-days: 1
          if-no-files-found: warn

      - name: Check benchmark result
        if: always()
        run: exit "${BENCH_FAIL:-0}"

  prefill-gateway-build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' || needs.detect-changes.outputs.prefill-gateway == 'true' }}
    name: Prefill Gateway Build & Unit Tests
    # Same jammy image as cpp-build so the prefill_gateway binary is
    # compatible with the tt-ubuntu-2204-xlarge-stable bench runner.
    runs-on: tt-ubuntu-2204-large-stable
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      no_proxy: "localhost,127.0.0.1,::1"
      CI_CCACHE: "1"
      CCACHE_DIR: ${{ github.workspace }}/tt-media-server/.cache/ccache
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up C++ CI dependencies
        uses: ./.github/actions/setup-cpp-ci
        with:
          init-private-submodule: "false"

      - name: Configure prefill_gateway
        run: |
          cmake -S prefill_gateway -B prefill_gateway/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build prefill_gateway
        run: cmake --build prefill_gateway/build -j "$(nproc)"

      - name: Run clang-tidy on gateway sources
        run: |
          find prefill_gateway/src -name '*.cpp' -print0 \
            | xargs -0 clang-tidy-20 \
                -p prefill_gateway/build \
                --warnings-as-errors='*'

      - name: Run prefill_gateway unit tests (TCP)
        run: |
          cd prefill_gateway/build
          SOCKET_TRANSPORT=tcp ctest --output-on-failure

      - name: Run prefill_gateway unit tests (ZMQ)
        run: |
          cd prefill_gateway/build
          SOCKET_TRANSPORT=zmq ctest --output-on-failure

      - name: Upload prefill_gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: prefill-gateway-build
          path: tt-media-server/prefill_gateway/build/prefill_gateway
          retention-days: 1

  prefill-gateway-tsan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' || needs.detect-changes.outputs.prefill-gateway == 'true' }}
    name: Prefill Gateway ThreadSanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      no_proxy: "localhost,127.0.0.1,::1"
      CI_CCACHE: "1"
      CCACHE_DIR: ${{ github.workspace }}/tt-media-server/.cache/ccache
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up C++ CI dependencies
        uses: ./.github/actions/setup-cpp-ci
        with:
          init-private-submodule: "false"

      - name: Configure prefill_gateway with ThreadSanitizer
        run: |
          cmake -S prefill_gateway -B prefill_gateway/tsan_build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build prefill_gateway (TSan)
        run: cmake --build prefill_gateway/tsan_build -j "$(nproc)"

      - name: Run prefill_gateway tests under TSan (TCP)
        env:
          TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1:history_size=7"
        run: |
          cd prefill_gateway/tsan_build
          SOCKET_TRANSPORT=tcp ctest --output-on-failure 2>&1 | tee ../../gw_tsan_tcp.log

      - name: Run prefill_gateway tests under TSan (ZMQ)
        env:
          TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1:history_size=7"
        run: |
          cd prefill_gateway/tsan_build
          SOCKET_TRANSPORT=zmq ctest --output-on-failure 2>&1 | tee ../../gw_tsan_zmq.log

      - name: Check TSan output
        if: always()
        run: |
          RACES=0
          for LOG in gw_tsan_tcp.log gw_tsan_zmq.log; do
            N=$(grep -c "WARNING: ThreadSanitizer" "$LOG" 2>/dev/null || echo 0)
            N=$(echo "$N" | tr -dc '0-9'); N=${N:-0}
            RACES=$((RACES + N))
          done
          {
            echo "## 🧵 Prefill Gateway ThreadSanitizer"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **Race reports (TCP)** | $(grep -c 'WARNING: ThreadSanitizer' gw_tsan_tcp.log 2>/dev/null || echo 0) |"
            echo "| **Race reports (ZMQ)** | $(grep -c 'WARNING: ThreadSanitizer' gw_tsan_zmq.log 2>/dev/null || echo 0) |"
            echo ""
          } >> $GITHUB_STEP_SUMMARY
          if [ "$RACES" -gt 0 ]; then
            echo "::error::ThreadSanitizer detected $RACES data race(s) in prefill_gateway"
            exit 1
          fi
          echo "✅ No data races detected" >> $GITHUB_STEP_SUMMARY

      - name: Upload TSan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prefill-gateway-tsan-log
          path: |
            tt-media-server/gw_tsan_tcp.log
            tt-media-server/gw_tsan_zmq.log
          retention-days: 7
          if-no-files-found: warn

  cpp-server-gateway-split:
    needs: [detect-changes, cpp-build, prefill-gateway-build]
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' || needs.detect-changes.outputs.prefill-gateway == 'true' }}
    name: C++ Server Gateway Split Test
    runs-on: tt-ubuntu-2204-xlarge-stable
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}/tt-media-server
      no_proxy: "localhost,127.0.0.1,::1"
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download C++ server build
        uses: actions/download-artifact@v4
        with:
          name: cpp-server-build
          path: tt-media-server/cpp_server

      - name: Set up C++ build artifact
        run: bash cpp_server/scripts/ci/setup_cpp_artifact.sh

      - name: Download prefill_gateway binary
        uses: actions/download-artifact@v4
        with:
          name: prefill-gateway-build
          path: tt-media-server/prefill_gateway/build

      - name: Make binaries executable
        run: chmod +x prefill_gateway/build/prefill_gateway

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install Python test dependencies
        run: bash cpp_server/scripts/ci/install_bench_client.sh

      # ── Round 1: TCP transport ────────────────────────────────────────────
      # Startup order: prefill-1 → prefill-2 → gateway → decode.
      # In gateway mode the prefill is a server (listens) and the gateway
      # dials each prefill.  Decode dials the gateway's decode-facing port.
      # All components must use the same SOCKET_TRANSPORT;
      - name: "[TCP] Start Prefill server 1 (gateway mode)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8201 --port 9201 --label "TCP gateway prefill-1"
          cd cpp_server/build
          NS=gw_prefill1
          SOCKET_TRANSPORT=tcp USE_PREFILL_GATEWAY=1 LLM_MODE=prefill SOCKET_PORT=9201 \
          PREFILL_SERVER_ID=prefill-1 PREFILL_MAX_IN_FLIGHT=4 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8201 -t 4 > ../../gw_prefill1.log 2>&1 &
          echo $! > ../../gw_prefill1.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8201 --pid-file gw_prefill1.pid --label "TCP gateway prefill-1"

      - name: "[TCP] Start Prefill server 2 (gateway mode)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8202 --port 9202 --label "TCP gateway prefill-2"
          cd cpp_server/build
          NS=gw_prefill2
          SOCKET_TRANSPORT=tcp USE_PREFILL_GATEWAY=1 LLM_MODE=prefill SOCKET_PORT=9202 \
          PREFILL_SERVER_ID=prefill-2 PREFILL_MAX_IN_FLIGHT=4 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8202 -t 4 > ../../gw_prefill2.log 2>&1 &
          echo $! > ../../gw_prefill2.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8202 --pid-file gw_prefill2.pid --label "TCP gateway prefill-2"

      - name: "[TCP] Start PrefillGateway"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 9200 --label "TCP prefill gateway"
          SOCKET_TRANSPORT=tcp TT_LOG_LEVEL=debug \
            ./prefill_gateway/build/prefill_gateway \
            --decode-port=9200 \
            --prefill=127.0.0.1:9201 \
            --prefill=127.0.0.1:9202 \
            --metrics-port=0 \
            > gw.log 2>&1 &
          echo $! > gw.pid
          bash cpp_server/scripts/ci/wait_for_command.sh \
            --command '[ "$(grep -c "Prefill registered" gw.log 2>/dev/null || echo 0)" -ge 2 ]' \
            --pid-file gw.pid \
            --failure-log gw.log \
            --label "TCP prefill gateway registrations"
          REG=$(grep -c "Prefill registered" gw.log 2>/dev/null || echo 0)
          if [ "$REG" -lt 2 ]; then
            echo "ERROR: Expected 2 prefill registrations in gateway log, got $REG"
            exit 1
          fi

      - name: "[TCP] Start Decode server"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8200 --label "TCP gateway decode server"
          cd cpp_server/build
          NS=gw_decode
          SOCKET_TRANSPORT=tcp USE_PREFILL_GATEWAY=1 LLM_MODE=decode \
          SOCKET_HOST=127.0.0.1 SOCKET_PORT=9200 \
          TT_LOG_LEVEL=debug \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8200 -t 4 > ../../gw_decode.log 2>&1 &
          echo $! > ../../gw_decode.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8200 --pid-file gw_decode.pid --label "TCP gateway decode server"

      - name: "[TCP] Verify gateway socket connections"
        run: |
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8201 --expect '"socket_status":"server:connected"' --pid-file gw_prefill1.pid --label "TCP gateway prefill-1 socket"
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8202 --expect '"socket_status":"server:connected"' --pid-file gw_prefill2.pid --label "TCP gateway prefill-2 socket"
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8200 --expect '"socket_status":"client:connected"' --pid-file gw_decode.pid --label "TCP gateway decode socket"
          P1=$(curl -sf "http://127.0.0.1:8201/tt-liveness" 2>/dev/null || true)
          P2=$(curl -sf "http://127.0.0.1:8202/tt-liveness" 2>/dev/null || true)
          DEC=$(curl -sf "http://127.0.0.1:8200/tt-liveness" 2>/dev/null || true)
          echo "Prefill-1 liveness: $P1"
          echo "Prefill-2 liveness: $P2"
          echo "Decode liveness:    $DEC"
          FAIL=0
          for VAR_NAME in "Prefill-1:$P1" "Prefill-2:$P2"; do
            NAME="${VAR_NAME%%:*}"
            VAL="${VAR_NAME#*:}"
            if ! echo "$VAL" | grep -q '"socket_status":"server:connected"'; then
              echo "ERROR: $NAME socket_status is not 'server:connected'"
              FAIL=1
            fi
          done
          if ! echo "$DEC" | grep -q '"socket_status":"client:connected"'; then
            echo "ERROR: Decode socket_status is not 'client:connected'"
            FAIL=1
          fi
          [ "$FAIL" -eq 0 ] || exit 1

      - name: "[TCP] Run vLLM bench serve through gateway"
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --base-url http://127.0.0.1:8200 \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-gateway-split-tcp-result.json" \
            2>&1 | tee bench_gateway_tcp_output.txt

      - name: "[TCP] Stop gateway and servers"
        if: always()
        run: |
          [ -f gw_decode.pid ]   && kill $(cat gw_decode.pid)   2>/dev/null || true
          [ -f gw.pid ]          && kill $(cat gw.pid)           2>/dev/null || true
          [ -f gw_prefill1.pid ] && kill $(cat gw_prefill1.pid) 2>/dev/null || true
          [ -f gw_prefill2.pid ] && kill $(cat gw_prefill2.pid) 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8200 --port 8201 --port 8202 --port 9200 --port 9201 --port 9202 --label "TCP gateway split"

      # ── Round 2: ZMQ transport ────────────────────────────────────────────
      - name: "[ZMQ] Start Prefill server 1 (gateway mode)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8201 --label "ZMQ gateway prefill-1"
          cd cpp_server/build
          NS=gw_zmq_prefill1
          SOCKET_TRANSPORT=zmq USE_PREFILL_GATEWAY=1 LLM_MODE=prefill \
          SOCKET_HOST=127.0.0.1 SOCKET_PORT=9201 \
          PREFILL_SERVER_ID=prefill-1 PREFILL_MAX_IN_FLIGHT=4 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8201 -t 4 > ../../gw_zmq_prefill1.log 2>&1 &
          echo $! > ../../gw_zmq_prefill1.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8201 --pid-file gw_zmq_prefill1.pid --label "ZMQ gateway prefill-1"

      - name: "[ZMQ] Start Prefill server 2 (gateway mode)"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8202 --label "ZMQ gateway prefill-2"
          cd cpp_server/build
          NS=gw_zmq_prefill2
          SOCKET_TRANSPORT=zmq USE_PREFILL_GATEWAY=1 LLM_MODE=prefill \
          SOCKET_HOST=127.0.0.1 SOCKET_PORT=9201 \
          PREFILL_SERVER_ID=prefill-2 PREFILL_MAX_IN_FLIGHT=4 \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8202 -t 4 > ../../gw_zmq_prefill2.log 2>&1 &
          echo $! > ../../gw_zmq_prefill2.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8202 --pid-file gw_zmq_prefill2.pid --label "ZMQ gateway prefill-2"

      - name: "[ZMQ] Start PrefillGateway"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 9200 --port 9201 --label "ZMQ prefill gateway"
          SOCKET_TRANSPORT=zmq TT_LOG_LEVEL=debug \
            ./prefill_gateway/build/prefill_gateway \
            --decode-port=9200 \
            --prefill-bind=127.0.0.1:9201 \
            --metrics-port=0 \
            > gw_zmq.log 2>&1 &
          echo $! > gw_zmq.pid
          bash cpp_server/scripts/ci/wait_for_command.sh \
            --command '[ "$(grep -c "Prefill registered" gw_zmq.log 2>/dev/null || echo 0)" -ge 2 ]' \
            --pid-file gw_zmq.pid \
            --failure-log gw_zmq.log \
            --label "ZMQ prefill gateway registrations"
          REG=$(grep -c "Prefill registered" gw_zmq.log 2>/dev/null || echo 0)
          if [ "$REG" -lt 2 ]; then
            echo "ERROR: Expected 2 prefill registrations in gateway log, got $REG"
            exit 1
          fi

      - name: "[ZMQ] Start Decode server"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8200 --label "ZMQ gateway decode server"
          cd cpp_server/build
          NS=gw_zmq_decode
          SOCKET_TRANSPORT=zmq USE_PREFILL_GATEWAY=1 LLM_MODE=decode \
          SOCKET_HOST=127.0.0.1 SOCKET_PORT=9200 \
          TT_LOG_LEVEL=debug \
          TT_WARMUP_SIGNALS_QUEUE=tt_warmup_signals_$NS \
          TT_TASK_QUEUE=tt_tasks_$NS \
          TT_RESULT_QUEUE=tt_results_$NS \
          TT_CANCEL_QUEUE=tt_cancels_$NS \
          TT_MEMORY_REQUEST_QUEUE=tt_mem_requests_$NS \
          TT_MEMORY_RESULT_QUEUE=tt_mem_results_$NS \
          TT_WORKER_METRICS_SHM=/tt_worker_metrics_$NS \
            ./tt_media_server_cpp -p 8200 -t 4 > ../../gw_zmq_decode.log 2>&1 &
          echo $! > ../../gw_zmq_decode.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8200 --pid-file gw_zmq_decode.pid --label "ZMQ gateway decode server"

      - name: "[ZMQ] Verify gateway socket connections"
        run: |
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8201 --expect '"socket_status":"client:connected"' --pid-file gw_zmq_prefill1.pid --label "ZMQ gateway prefill-1 socket"
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8202 --expect '"socket_status":"client:connected"' --pid-file gw_zmq_prefill2.pid --label "ZMQ gateway prefill-2 socket"
          bash cpp_server/scripts/ci/wait_for_liveness.sh --port 8200 --expect '"socket_status":"client:connected"' --pid-file gw_zmq_decode.pid --label "ZMQ gateway decode socket"
          P1=$(curl -sf "http://127.0.0.1:8201/tt-liveness" 2>/dev/null || true)
          P2=$(curl -sf "http://127.0.0.1:8202/tt-liveness" 2>/dev/null || true)
          DEC=$(curl -sf "http://127.0.0.1:8200/tt-liveness" 2>/dev/null || true)
          echo "Prefill-1 liveness: $P1"
          echo "Prefill-2 liveness: $P2"
          echo "Decode liveness:    $DEC"
          FAIL=0
          for VAR_NAME in "Prefill-1:$P1" "Prefill-2:$P2"; do
            NAME="${VAR_NAME%%:*}"
            VAL="${VAR_NAME#*:}"
            if ! echo "$VAL" | grep -q '"socket_status":"client:connected"'; then
              echo "ERROR: $NAME socket_status is not 'client:connected'"
              FAIL=1
            fi
          done
          if ! echo "$DEC" | grep -q '"socket_status":"client:connected"'; then
            echo "ERROR: Decode socket_status is not 'client:connected'"
            FAIL=1
          fi
          [ "$FAIL" -eq 0 ] || exit 1

      - name: "[ZMQ] Run vLLM bench serve through gateway"
        env:
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          vllm bench serve \
            --model 'deepseek-ai/DeepSeek-R1-0528' \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --base-url http://127.0.0.1:8200 \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-gateway-split-zmq-result.json" \
            2>&1 | tee bench_gateway_zmq_output.txt

      - name: "[ZMQ] Stop gateway and servers"
        if: always()
        run: |
          [ -f gw_zmq_decode.pid ]   && kill $(cat gw_zmq_decode.pid)   2>/dev/null || true
          [ -f gw_zmq.pid ]          && kill $(cat gw_zmq.pid)           2>/dev/null || true
          [ -f gw_zmq_prefill1.pid ] && kill $(cat gw_zmq_prefill1.pid) 2>/dev/null || true
          [ -f gw_zmq_prefill2.pid ] && kill $(cat gw_zmq_prefill2.pid) 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8200 --port 8201 --port 8202 --port 9200 --port 9201 --label "ZMQ gateway split"

      - name: Check benchmark thresholds
        run: |
          CONFIG=cpp_server/scripts/ci/vllm_thresholds.json
          CHECK=cpp_server/scripts/ci/check_vllm_result.py
          FAIL=0
          python3 "$CHECK" --config "$CONFIG" --scenario gateway_split_tcp \
            --result vllm-bench-gateway-split-tcp-result.json || FAIL=1
          python3 "$CHECK" --config "$CONFIG" --scenario gateway_split_zmq \
            --result vllm-bench-gateway-split-zmq-result.json || FAIL=1
          echo "BENCH_FAIL=$FAIL" >> "$GITHUB_ENV"

      - name: Show server logs
        if: always()
        run: |
          for LOG in gw.log gw_prefill1.log gw_prefill2.log gw_decode.log \
                     gw_zmq.log gw_zmq_prefill1.log gw_zmq_prefill2.log gw_zmq_decode.log; do
            echo "=== $LOG ==="
            [ -f "$LOG" ] && cat "$LOG" || echo "(not found)"
            echo ""
          done

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-server-gateway-split-result
          path: |
            tt-media-server/vllm-bench-gateway-split-tcp-result.json
            tt-media-server/vllm-bench-gateway-split-zmq-result.json
          retention-days: 1
          if-no-files-found: warn

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-server-gateway-split-logs
          path: |
            tt-media-server/gw.log
            tt-media-server/gw_prefill1.log
            tt-media-server/gw_prefill2.log
            tt-media-server/gw_decode.log
            tt-media-server/gw_zmq.log
            tt-media-server/gw_zmq_prefill1.log
            tt-media-server/gw_zmq_prefill2.log
            tt-media-server/gw_zmq_decode.log
          retention-days: 1
          if-no-files-found: warn

      - name: Check benchmark result
        if: always()
        run: exit "${BENCH_FAIL:-0}"

  dynamo-frontend-integration:
    needs: [detect-changes, cpp-build]
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' }}
    name: C++ Server + Dynamo Frontend Integration
    # Same jammy runner as the cpp-server bench jobs so the artifact built by
    # cpp-build links against the same glibc / libstdc++ at runtime.
    runs-on: tt-ubuntu-2204-xlarge-stable
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}/tt-media-server
      no_proxy: "localhost,127.0.0.1,::1"
      # Shared by the Dynamo frontend and every cpp_server backend in this
      # job so all processes agree on discovery store, request/event plane,
      # and endpoint identity (NAMESPACE/COMPONENT/ENDPOINT). Mirrors the
      # exports in cpp_server/scripts/start_dynamo.sh — we set them at the
      # job level so we can launch one frontend + N backends without
      # repeating the env block on every step.
      DYN_DISCOVERY_BACKEND: etcd
      ETCD_ENDPOINTS: http://127.0.0.1:2379
      DYN_REQUEST_PLANE: tcp
      DYN_EVENT_PLANE: zmq
      DYNAMO_DISCOVERY_BACKEND: etcd
      DYNAMO_ETCD_ENDPOINTS: http://127.0.0.1:2379
      DYNAMO_NAMESPACE: default
      DYNAMO_COMPONENT: backend
      DYNAMO_ENDPOINT_NAME: generate
      DYNAMO_ENDPOINT_ENABLED: "1"
      LLM_DEVICE_BACKEND: mock_pipeline
      MODEL_NAME: deepseek-ai/DeepSeek-R1-0528
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download C++ build
        uses: actions/download-artifact@v4
        with:
          name: cpp-server-build
          path: tt-media-server/cpp_server

      - name: Set up C++ build artifact
        run: bash cpp_server/scripts/ci/setup_cpp_artifact.sh

      # No-docker etcd: grab the upstream signed binary tarball from the
      # etcd-io GitHub release. Two cpp_server backends registering under the
      # same DYNAMO_NAMESPACE/COMPONENT/ENDPOINT need a shared discovery
      # store; the script's default `file` backend does an unconditional
      # `rm -rf ${DYN_FILE_STORE}` at startup, so concurrent starts would
      # race-delete each other's registrations. etcd avoids that.
      - name: Install etcd from upstream release
        working-directory: .
        run: |
          ETCD_VER=v3.5.13
          curl -fsSL \
            "https://github.com/etcd-io/etcd/releases/download/${ETCD_VER}/etcd-${ETCD_VER}-linux-amd64.tar.gz" \
            -o /tmp/etcd.tar.gz
          mkdir -p /tmp/etcd
          tar xzf /tmp/etcd.tar.gz -C /tmp/etcd --strip-components=1
          sudo install -m 0755 /tmp/etcd/etcd    /usr/local/bin/etcd
          sudo install -m 0755 /tmp/etcd/etcdctl /usr/local/bin/etcdctl
          etcd --version
          etcdctl version

      - name: Start etcd
        run: |
          pkill -f '/usr/local/bin/etcd' 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 2379 --port 2380 --label "etcd"
          rm -rf /tmp/etcd-data
          ss -ltnp '( sport = :2379 or sport = :2380 )' || true
          pgrep -af etcd || true
          # --data-dir under /tmp so it gets wiped between runs; bind to
          # 127.0.0.1 only — the Dynamo frontend and both cpp_server
          # backends run on this same runner.
          etcd \
            --data-dir /tmp/etcd-data \
            --advertise-client-urls=http://127.0.0.1:2379 \
            --listen-client-urls=http://127.0.0.1:2379 \
            --listen-peer-urls=http://127.0.0.1:2380 \
            --initial-advertise-peer-urls=http://127.0.0.1:2380 \
            --initial-cluster='default=http://127.0.0.1:2380' \
            > etcd.log 2>&1 &
          echo $! > etcd.pid
          bash cpp_server/scripts/ci/wait_for_command.sh \
            --command 'etcdctl --endpoints=http://127.0.0.1:2379 endpoint health' \
            --pid-file etcd.pid \
            --failure-log etcd.log \
            --label "etcd"
          etcdctl --endpoints=http://127.0.0.1:2379 endpoint health

      - name: Set up uv for Dynamo
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Create dynamo venv with ai-dynamo + vllm
        run: |
          mkdir -p "$HOME/.venvs"
          # vllm is the bench client. transformers<5.6 mirrors the other
          # cpp-server bench jobs — 5.6.x regresses tokenizer cost and
          # inflates client-side TTFT/TPOT independently of the backend.
          bash cpp_server/scripts/ci/install_bench_client.sh \
            --venv "$HOME/.venvs/dynamo" \
            --python ${{ env.PYTHON_VERSION }} \
            --package ai-dynamo \
            --package uvloop

      # Two cpp_server backends + one Dynamo frontend. The frontend
      # discovers both backends through the shared etcd store (one instance
      # key per backend under v1/instances/<ns>/<component>/<endpoint>/) and
      # load-balances requests across them. Backends register the same
      # NAMESPACE/COMPONENT/ENDPOINT (inherited from job-level env) and are
      # only differentiated by their cpp_server HTTP port (8001 vs 8002)
      # and their etcd lease id; the frontend's display model_name is set
      # once for the whole fleet.
      - name: Start cpp_server backend 1 (port 8001)
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --label "Dynamo backend 1"
          cd cpp_server
          ./build/tt_media_server_cpp -p 8001 > ../backend1.log 2>&1 &
          echo $! > ../backend1.pid
          cd ..
          bash cpp_server/scripts/ci/wait_for_liveness.sh \
            --port 8001 \
            --timeout 120 \
            --interval 2 \
            --pid-file backend1.pid \
            --label "Dynamo backend 1"

      - name: Start cpp_server backend 2 (port 8002)
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8002 --label "Dynamo backend 2"
          cd cpp_server
          ./build/tt_media_server_cpp -p 8002 > ../backend2.log 2>&1 &
          echo $! > ../backend2.pid
          cd ..
          bash cpp_server/scripts/ci/wait_for_liveness.sh \
            --port 8002 \
            --timeout 120 \
            --interval 2 \
            --pid-file backend2.pid \
            --label "Dynamo backend 2"

      - name: Assert tokenizer + config bundle from cpp-build artifact
        # cpp_server/build.sh's tokenizer pre-fetch is the single source of
        # truth for what lands in the build artifact. The Dynamo frontend
        # needs all three files (tokenizer.json, tokenizer_config.json,
        # config.json) under the model dir or it dies at startup with
        # `unable to extract config.json from directory ...`. Fail loudly
        # here rather than discover it via a 60s frontend-ready timeout.
        run: |
          MODEL_DIR="cpp_server/tokenizers/deepseek-ai/DeepSeek-R1-0528"
          for f in config.json tokenizer.json tokenizer_config.json; do
            [ -f "${MODEL_DIR}/${f}" ] || {
              echo "::error::Missing ${MODEL_DIR}/${f} in cpp-build artifact."
              echo "  Expected cpp_server/build.sh's download_tokenizer to pre-fetch this."
              exit 1
            }
          done
          echo "✅ Tokenizer + config files present:"
          ls -la "${MODEL_DIR}"

      - name: Start single Dynamo frontend (port 8000)
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8000 --label "Dynamo frontend"
          # MODEL_PATH resolution mirrors cpp_server/scripts/start_dynamo.sh
          # for the mock_pipeline backend (LLM_DEVICE_BACKEND default →
          # deepseek-ai/DeepSeek-R1-0528 tokenizer dir). Keeping the
          # frontend tokenizer in sync with the backend avoids vocab
          # mismatches that show up as model-routing rejections.
          #
          # --router-mode kv: required for the per-worker last-observed
          # ITL/TTFT gauges to populate per cpp_server instance. The
          # default round-robin router doesn't attach the worker label,
          # so the "both backends took traffic" verification step below
          # would have nothing to count.
          MODEL_PATH="${GITHUB_WORKSPACE}/tt-media-server/cpp_server/tokenizers/deepseek-ai/DeepSeek-R1-0528"
          "$HOME/.venvs/dynamo/bin/python3" -m dynamo.frontend \
              --http-port 8000 \
              --router-mode kv \
              --model-name "${MODEL_NAME}" \
              --model-path "${MODEL_PATH}" \
              > frontend.log 2>&1 &
          echo $! > frontend.pid
          bash cpp_server/scripts/ci/wait_for_command.sh \
            --command 'curl -sf "http://127.0.0.1:8000/v1/models" 2>/dev/null | grep -q "\"data\""' \
            --timeout 120 \
            --interval 2 \
            --pid-file frontend.pid \
            --failure-log frontend.log \
            --label "Dynamo frontend"

      - name: Verify both backends registered in etcd
        # cpp_server's etcd discovery writes one instance + one MDC entry per
        # backend under v1/instances/<ns>/<component>/<endpoint>/<id_hex>
        # (see tt-media-server/cpp_server/src/dynamo/discovery.cpp).
        # With NAMESPACE/COMPONENT/ENDPOINT defaulted to
        # default/backend/generate, expect ≥2 distinct instance keys.
        run: |
          KEYS=$(etcdctl --endpoints=http://127.0.0.1:2379 \
            get --prefix --keys-only "v1/instances/default/backend/generate/")
          echo "etcd instance keys:"
          echo "$KEYS"
          COUNT=$(printf '%s\n' "$KEYS" | grep -c "v1/instances/default/backend/generate/" || true)
          if [ "$COUNT" -lt 2 ]; then
            echo "::error::Expected ≥2 backend registrations in etcd, got $COUNT"
            exit 1
          fi
          echo "✅ $COUNT cpp_server backends registered in etcd"

      - name: Run vllm bench serve against the Dynamo frontend
        env:
          # ai-dynamo/Dynamo's OpenAI surface still requires a bearer; any
          # non-empty string works for the mock backend.
          OPENAI_API_KEY: 'your-secret-key'
        run: |
          # Single frontend on :8000 fans requests out across both
          # cpp_server backends discovered via etcd; success here proves
          # the load-balanced routing path end-to-end.
          vllm bench serve \
            --model "${MODEL_NAME}" \
            --backend openai-chat \
            --endpoint /v1/chat/completions \
            --base-url http://127.0.0.1:8000 \
            --dataset-name random \
            --random-input-len 128 \
            --random-output-len 128 \
            --num-prompts 1000 \
            --max-concurrency 64 \
            --save-result \
            --result-filename "vllm-bench-dynamo.json" \
            2>&1 | tee bench_dynamo_output.txt

      - name: Verify both backends served traffic (per-worker ITL gauge)
        # Dynamo's frontend exposes per-worker last-observed gauges on
        # /metrics (same HTTP port as the API). With --router-mode kv
        # every served chunk is tagged with the worker_id of the
        # cpp_server instance that produced it, so after a bench of
        # 1000 random prompts at concurrency 64 we expect ≥2 distinct
        # worker_id labels with a non-zero
        # `dynamo_frontend_worker_last_inter_token_latency_seconds`.
        #
        # A single active worker means the load-balancer collapsed onto
        # one backend — the regression mode this whole job exists to
        # detect (most recently caused by the etcd-empty-host bug in
        # cpp_server's discovery.cpp silencing one of the two
        # instances).
        #
        # Must run before the cleanup step below — once the frontend is
        # killed /metrics goes away.
        run: |
          METRICS=$(curl -sS http://127.0.0.1:8000/metrics)
          echo "--- per-worker ITL gauges ---"
          echo "$METRICS" \
            | grep -E '^dynamo_frontend_worker_last_inter_token_latency_seconds\{' \
            || echo "(no ITL gauges emitted — frontend never observed ≥2 tokens from any worker)"
          echo ""
          echo "--- per-worker TTFT gauges ---"
          echo "$METRICS" \
            | grep -E '^dynamo_frontend_worker_last_time_to_first_token_seconds\{' \
            || true
          echo ""
          # Count workers with non-zero ITL. The metric format is:
          #   dynamo_frontend_worker_last_inter_token_latency_seconds{...,worker_id="<decimal>",...} <float>
          # awk -F'} ' splits on the closing label brace + space, putting
          # the float value in $2.
          ACTIVE=$(printf '%s\n' "$METRICS" \
            | grep -E '^dynamo_frontend_worker_last_inter_token_latency_seconds\{' \
            | awk -F'} ' '$2 + 0 > 0 {n++} END {print n+0}')
          # Cross-check: count distinct cpp_server backends in etcd. The
          # ITL count must match — fewer means at least one registered
          # backend never received a request.
          REGISTERED=$(etcdctl --endpoints=http://127.0.0.1:2379 \
            get --prefix --keys-only "v1/instances/default/backend/generate/" \
            | grep -c "v1/instances/default/backend/generate/" || true)
          echo "registered_backends=${REGISTERED}  active_backends=${ACTIVE}"
          if [ "$ACTIVE" -lt 2 ]; then
            echo "::error::Only ${ACTIVE} backend(s) reported non-zero ITL after bench (registered=${REGISTERED}, expected ≥2 active)."
            echo "  Routing collapsed onto a single cpp_server instance — check etcd lease"
            echo "  registrations and the kv-event subscription in frontend.log."
            exit 1
          fi
          echo "✅ ${ACTIVE} cpp_server backends served traffic (matches ${REGISTERED} registered)" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "✅ ${ACTIVE} cpp_server backends served traffic"

      - name: Stop Dynamo frontend, cpp_server backends, and etcd
        if: always()
        run: |
          for pidfile in frontend.pid backend1.pid backend2.pid etcd.pid; do
            [ -f "$pidfile" ] && kill "$(cat "$pidfile")" 2>/dev/null || true
          done
          # Belt + suspenders: nuke any leftover frontends/backends/etcd still
          # bound, so a cancelled/timed-out run doesn't leak :2379/:2380 (or the
          # data-dir lock) into the next job on this persistent runner.
          pkill -f 'dynamo.frontend' 2>/dev/null || true
          pkill -f 'tt_media_server_cpp' 2>/dev/null || true
          pkill -f '/usr/local/bin/etcd' 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 2379 --port 2380 --port 8000 --port 8001 --port 8002 --label "Dynamo integration"

      - name: Check benchmark result
        run: |
          # Integration gate: every request must succeed. Latency is not
          # asserted here — the backend is a mock and the value of this job
          # is proving the wiring (Dynamo frontend -> etcd discovery ->
          # cpp_server TCP transport) works end-to-end.
          python3 cpp_server/scripts/ci/check_vllm_result.py \
            --config cpp_server/scripts/ci/vllm_thresholds.json \
            --scenario dynamo_frontend \
            --result vllm-bench-dynamo.json

      - name: Show server logs
        if: always()
        run: |
          for LOG in etcd.log frontend.log backend1.log backend2.log; do
            echo "=== $LOG ==="
            [ -f "$LOG" ] && cat "$LOG" || echo "(not found)"
            echo ""
          done

      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-frontend-integration-result
          path: tt-media-server/vllm-bench-dynamo.json
          retention-days: 1
          if-no-files-found: warn

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-frontend-integration-logs
          path: |
            tt-media-server/etcd.log
            tt-media-server/frontend.log
            tt-media-server/backend1.log
            tt-media-server/backend2.log
          retention-days: 1
          if-no-files-found: warn

  cpp-tsan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.cpp-server == 'true' }}
    name: C++ ThreadSanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      no_proxy: "localhost,127.0.0.1,::1"
      CI_CCACHE: "1"
      CCACHE_DIR: ${{ github.workspace }}/tt-media-server/.cache/ccache
    # Gating: any TSan race report after suppressions fails this job and the
    # whole pipeline. Known issues are listed in tsan_suppressions.txt with
    # their tracking issue IDs; remove the corresponding suppression line
    # when the issue is fixed so the regression check protects the fix.
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TT_LLM_ENGINE }}

      - name: Set up C++ CI dependencies
        uses: ./.github/actions/setup-cpp-ci
        with:
          token: ${{ secrets.TT_LLM_ENGINE }}

      - name: Build C++ server with ThreadSanitizer
        run: |
          cd cpp_server
          ./build.sh --tsan

      - name: Set up uv (for guidellm)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install guidellm
        run: |
          uv venv
          uv pip install guidellm
          echo "PATH=${{ github.workspace }}/tt-media-server/.venv/bin:$PATH" >> $GITHUB_ENV

      - name: Start TSan-instrumented server (mock_pipeline)
        env:
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tt-media-server/cpp_server/tsan_suppressions.txt:halt_on_error=0:second_deadlock_stack=1:history_size=7:log_path=tsan-server"
        run: |
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --label "TSan-instrumented server"
          cd cpp_server/build
          ./tt_media_server_cpp -p 8001 -t 4 > ../../tsan_server.log 2>&1 &
          echo $! > ../../tsan_server.pid
          cd ../..
          bash cpp_server/scripts/ci/wait_for_liveness.sh \
            --port 8001 \
            --timeout 180 \
            --interval 2 \
            --pid-file tsan_server.pid \
            --label "TSan-instrumented server"

      - name: Run concurrent multi-turn workload (8 users x 8 turns)
        env:
          OPENAI_API_KEY: 'your-secret-key'
          # Suppressions are loaded by the server itself — the bench client
          # doesn't need them, but inheriting the env is harmless.
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tt-media-server/cpp_server/tsan_suppressions.txt:halt_on_error=0"
        run: |
          mkdir -p bench_results/tsan_ci
          guidellm benchmark run \
            --target "http://localhost:8001" \
            --model "deepseek-ai/DeepSeek-R1-0528" \
            --request-format "/v1/chat/completions" \
            --profile concurrent \
            --rate 8 \
            --max-requests 64 \
            --data "prefix_tokens=512,prompt_tokens=512,output_tokens=128,turns=8" \
            --backend-kwargs "{\"api_key\": \"${OPENAI_API_KEY}\"}" \
            --output-path "bench_results/tsan_ci" \
            2>&1 | tee tsan_bench.log

      - name: Stop server
        if: always()
        run: |
          [ -f tsan_server.pid ] && kill $(cat tsan_server.pid) 2>/dev/null || true
          bash cpp_server/scripts/ci/wait_for_port_free.sh --port 8001 --label "TSan-instrumented server"

      - name: Analyze TSan output
        if: always()
        run: |
          set -u
          TOTAL=0
          {
            echo "## 🧵 ThreadSanitizer Results"
            echo ""
            echo "| Source | Race reports |"
            echo "|--------|------:|"
          } >> $GITHUB_STEP_SUMMARY

          shopt -s nullglob
          for f in cpp_server/build/tsan-server.*; do
            [ -f "$f" ] || continue
            COUNT=$(grep -c "WARNING: ThreadSanitizer" "$f" 2>/dev/null || echo 0)
            COUNT=$(echo "$COUNT" | tr -dc '0-9'); COUNT=${COUNT:-0}
            echo "$(basename "$f"): $COUNT"
            echo "| \`$(basename "$f")\` | $COUNT |" >> $GITHUB_STEP_SUMMARY
            TOTAL=$(( TOTAL + COUNT ))
          done

          {
            echo "| **Total (after suppressions)** | **$TOTAL** |"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL" -gt 0 ]; then
            echo "::warning::ThreadSanitizer detected $TOTAL data race(s) — see cpp-tsan-output artifact"
            {
              echo "⚠️ **$TOTAL data race(s) detected.** Stack traces in the \`cpp-tsan-output\` artifact."
              echo ""
              echo "Suppressions file: \`tt-media-server/cpp_server/tsan_suppressions.txt\`"
            } >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ No data races detected after suppressions" >> $GITHUB_STEP_SUMMARY

      - name: Upload TSan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-tsan-output
          path: |
            tt-media-server/cpp_server/build/tsan-server.*
            tt-media-server/tsan_server.log
            tt-media-server/tsan_bench.log
            tt-media-server/bench_results/tsan_ci/
          retention-days: 7
          if-no-files-found: warn

  forge-runner-changes:
    name: Detect Forge Runner Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.forge_runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Evaluate forge runner paths
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            forge_runner:
              - 'tt-media-server/requirements.txt'
              - 'tt-media-server/tt_model_runners/**'


  forge-runner-cpu-tests:
    needs: forge-runner-changes
    if: ${{ needs.forge-runner-changes.outputs.should-run == 'true' }}
    name: Forge Runner CPU Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tt-media-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pin to v1.3.1's commit SHA so this privileged cleanup action is reproducible.
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Forge Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # Dissable pip caching for now, it take longer than install sometimes
          # cache: 'pip'
          # cache-dependency-path: |
          #   tt-media-server/requirements.txt
          #   tt-media-server/tt_model_runners/forge_runners/requirements.txt

      - name: Create venv, install dependencies
        shell: bash
        run: |
          python${{ env.PYTHON_VERSION }} -m venv venv-${{ env.PYTHON_VERSION }}
          source venv-${{ env.PYTHON_VERSION }}/bin/activate
          export VLLM_TARGET_DEVICE="empty"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r tt_model_runners/forge_runners/requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run CPU-only tests
        shell: bash
        run: |
          source venv-${{ env.PYTHON_VERSION }}/bin/activate
          pytest tt_model_runners/forge_runners/test_forge_models.py -k "cpu" -v

  test-coverage:
    needs: [detect-changes, unit-tests-media]
    if: ${{ needs.detect-changes.outputs.should-test == 'true' && github.event_name == 'pull_request' }}
    name: Test Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install diff-cover
        run: python -m pip install diff-cover

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-data
          path: .

      - name: Check coverage of changed lines
        id: diff-cover
        run: |
          COVERAGE_THRESHOLD=15
          echo "coverage_threshold=$COVERAGE_THRESHOLD" >> $GITHUB_OUTPUT

          # Get the base branch
          BASE_REF="${{ github.event.pull_request.base.ref }}"

          # Check if coverage file exists
          if [ ! -f coverage.xml ]; then
            echo "::error::No coverage.xml artifact found; unit tests did not produce coverage data"
            echo "coverage_passed=false" >> $GITHUB_OUTPUT
            echo "coverage_pct=N/A" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Checking coverage for tt-media-server only (gradual rollout)"

          # Generate diff-cover report for changed lines only
          # --exclude uses fnmatch patterns (shell-style wildcards)
          # tt-inference-server-v2 is excluded from coverage checks entirely
          diff-cover coverage.xml \
            --compare-branch=origin/${BASE_REF} \
            --exclude '*/tests/*' '*/performance_tests/*' '*/config/settings.py' 'tt-inference-server-v2/*'\
            --fail-under="$COVERAGE_THRESHOLD" \
            > diff-cover-output.txt 2>&1 || DIFF_COVER_FAILED=true

          cat diff-cover-output.txt

          # Extract coverage percentage
          COVERAGE_PCT=$(grep -oE "Coverage: [0-9]+(\.[0-9]+)?%" diff-cover-output.txt | grep -oE "[0-9]+(\.[0-9]+)?" | tail -1 || echo "0")
          echo "coverage_pct=$COVERAGE_PCT" >> $GITHUB_OUTPUT

          if [ "$DIFF_COVER_FAILED" = "true" ]; then
            echo "coverage_passed=false" >> $GITHUB_OUTPUT
          else
            echo "coverage_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Fail if coverage below threshold
        if: ${{ steps.diff-cover.outputs.coverage_passed == 'false' }}
        run: |
          echo ""
          echo "❌ COVERAGE FAILED"
          echo "=================="
          echo "Coverage: ${{ steps.diff-cover.outputs.coverage_pct }}% (required: ${{ steps.diff-cover.outputs.coverage_threshold }}%)"
          echo ""

          # Show just the summary from diff-cover (first ~20 lines)
          if [ -f diff-cover-output.txt ]; then
            head -25 diff-cover-output.txt
          fi

          echo ""
          echo "💡 Add tests for the files listed above to increase coverage."
          echo ""

          exit 1

      - name: Generate coverage summary
        if: always()
        run: |
          COVERAGE_PCT="${{ steps.diff-cover.outputs.coverage_pct }}"
          COVERAGE_PASSED="${{ steps.diff-cover.outputs.coverage_passed }}"
          COVERAGE_THRESHOLD="${{ steps.diff-cover.outputs.coverage_threshold }}"

          # Determine status
          if [ "$COVERAGE_PASSED" = "true" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="PASSED"
          else
            STATUS_ICON="⚠️"
            STATUS_TEXT="BELOW THRESHOLD"
          fi

          echo "## $STATUS_ICON Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage of Changed Lines" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Coverage** | ${COVERAGE_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Threshold** | ${COVERAGE_THRESHOLD}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_ICON $STATUS_TEXT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 This checks coverage of **newly added/modified lines only**, not total codebase coverage." >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const coveragePct = '${{ steps.diff-cover.outputs.coverage_pct }}';
            const coveragePassed = '${{ steps.diff-cover.outputs.coverage_passed }}' === 'true';
            const coverageThreshold = '${{ steps.diff-cover.outputs.coverage_threshold }}';

            const statusIcon = coveragePassed ? '✅' : '❌';
            const statusText = coveragePassed ? 'PASSED' : 'FAILED';

            const commentBody = `## ${statusIcon} Test Coverage Report

            ### Coverage of Changed Lines

            | Metric | Value |
            |--------|-------|
            | **Coverage** | ${coveragePct}% |
            | **Threshold** | ${coverageThreshold}% |
            | **Status** | ${statusIcon} ${statusText} |

            > 💡 This checks coverage of **newly added/modified lines only**, not total codebase coverage.
            ${!coveragePassed ? `\n> ❌ **This PR cannot be merged until coverage reaches at least ${coverageThreshold}%.**` : ''}`;

            // Find existing coverage comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Test Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            diff-cover-output.txt
          retention-days: 14

  helm-chart-validate:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.helm-inputs == 'true' || needs.detect-changes.outputs.charts == 'true' }}
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install "ruamel.yaml==0.18.6" pytest pyyaml

      - name: Verify values.yaml matches workflows/model_spec.py
        run: pytest tests/test_helm_generator/test_values_in_sync.py -v

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Generate model-device matrix
        run: |
          python3 - <<'EOF' > /tmp/helm-matrix.txt
          import yaml
          with open('charts/tt-inference-server/values.yaml') as f:
              v = yaml.safe_load(f)
          for model, cfg in v['models'].items():
              for key in cfg:
                  if key != 'serverType':
                      print(f"{model},{key}")
          EOF

      - name: Helm template validation
        run: |
          FAILED=0
          while IFS=',' read -r model device; do
            echo "--- Validating: $model / $device"
            if ! helm template ci-test charts/tt-inference-server \
                --set "model=$model" \
                --set "device=$device" \
                | kubeconform -strict -summary; then
              echo "FAILED: $model / $device"
              FAILED=1
            fi
          done < /tmp/helm-matrix.txt
          exit $FAILED

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
      - lint
      - verify-media-server-install
      - unit-tests-main
      - unit-tests-media
      - unit-tests-summary
      - forge-runner-changes
      - forge-runner-cpu-tests
      - llm-streaming-performance
      - test-coverage
      - cpp-format-check
      - cpp-build
      - cpp-server-benchmarks
      - cpp-server-prefill-decode-split
      - prefill-gateway-format-check
      - prefill-gateway-build
      - prefill-gateway-tsan
      - cpp-server-gateway-split
      - cpp-tsan
      - dynamo-frontend-integration
      - helm-chart-validate
    if: always()
    steps:
      - name: Check results
        run: |
          STATUS=0
          EVENT_NAME="${{ github.event_name }}"
          SHOULD_TEST="${{ needs.detect-changes.outputs.should-test }}"
          CPP_SERVER="${{ needs.detect-changes.outputs.cpp-server }}"
          PREFILL_GATEWAY="${{ needs.detect-changes.outputs.prefill-gateway }}"
          MEDIA_SERVER_DEPS="${{ needs.detect-changes.outputs.media-server-deps }}"
          CHARTS="${{ needs.detect-changes.outputs.charts }}"
          HELM_INPUTS="${{ needs.detect-changes.outputs.helm-inputs }}"
          FORGE_RUNNER="${{ needs.forge-runner-changes.outputs.should-run }}"

          skipped_reason() {
            case "$1" in
              lint|unit-tests-main|unit-tests-media|unit-tests-summary|llm-streaming-performance)
                if [[ "$SHOULD_TEST" != "true" ]]; then
                  echo "no Python, dependency, or workflow paths matched"
                else
                  echo "job condition evaluated false"
                fi
                ;;
              verify-media-server-install)
                if [[ "$MEDIA_SERVER_DEPS" != "true" ]]; then
                  echo "media-server dependency or Docker inputs did not change"
                else
                  echo "job condition evaluated false"
                fi
                ;;
              test-coverage)
                if [[ "$EVENT_NAME" != "pull_request" ]]; then
                  echo "coverage comments only run on pull_request events"
                elif [[ "$SHOULD_TEST" != "true" ]]; then
                  echo "no Python, dependency, or workflow paths matched"
                else
                  echo "job condition evaluated false"
                fi
                ;;
              cpp-format-check|cpp-build|cpp-server-benchmarks|cpp-server-prefill-decode-split|dynamo-frontend-integration|cpp-tsan)
                if [[ "$CPP_SERVER" != "true" ]]; then
                  echo "cpp_server paths did not change"
                else
                  echo "job condition evaluated false"
                fi
                ;;
              prefill-gateway-format-check|prefill-gateway-build|prefill-gateway-tsan|cpp-server-gateway-split)
                if [[ "$CPP_SERVER" != "true" && "$PREFILL_GATEWAY" != "true" ]]; then
                  echo "neither cpp_server nor prefill_gateway paths changed"
                else
                  echo "job condition evaluated false"
                fi
                ;;
              forge-runner-cpu-tests)
                if [[ "$EVENT_NAME" != "pull_request" ]]; then
                  echo "forge runner path detection only runs on pull_request events"
                elif [[ "$FORGE_RUNNER" != "true" ]]; then
                  echo "forge runner paths did not change"
                else
                  echo "job condition evaluated false"
                fi
                ;;
              helm-chart-validate)
                if [[ "$CHARTS" != "true" && "$HELM_INPUTS" != "true" ]]; then
                  echo "chart and Helm generator inputs did not change"
                else
                  echo "job condition evaluated false"
                fi
                ;;
              *)
                echo "job condition evaluated false"
                ;;
            esac
          }

          JOB_ORDER=(
            detect-changes
            lint
            verify-media-server-install
            unit-tests-main
            unit-tests-media
            unit-tests-summary
            forge-runner-changes
            forge-runner-cpu-tests
            llm-streaming-performance
            test-coverage
            cpp-format-check
            cpp-build
            cpp-server-benchmarks
            cpp-server-prefill-decode-split
            prefill-gateway-format-check
            prefill-gateway-build
            prefill-gateway-tsan
            cpp-server-gateway-split
            dynamo-frontend-integration
            cpp-tsan
            helm-chart-validate
          )
          declare -A JOBS=(
            [detect-changes]="${{ needs.detect-changes.result }}"
            [lint]="${{ needs.lint.result }}"
            [verify-media-server-install]="${{ needs.verify-media-server-install.result }}"
            [unit-tests-main]="${{ needs.unit-tests-main.result }}"
            [unit-tests-media]="${{ needs.unit-tests-media.result }}"
            [unit-tests-summary]="${{ needs.unit-tests-summary.result }}"
            [forge-runner-changes]="${{ needs.forge-runner-changes.result }}"
            [forge-runner-cpu-tests]="${{ needs.forge-runner-cpu-tests.result }}"
            [llm-streaming-performance]="${{ needs.llm-streaming-performance.result }}"
            [test-coverage]="${{ needs.test-coverage.result }}"
            [cpp-format-check]="${{ needs.cpp-format-check.result }}"
            [cpp-build]="${{ needs.cpp-build.result }}"
            [cpp-server-benchmarks]="${{ needs.cpp-server-benchmarks.result }}"
            [cpp-server-prefill-decode-split]="${{ needs.cpp-server-prefill-decode-split.result }}"
            [prefill-gateway-format-check]="${{ needs.prefill-gateway-format-check.result }}"
            [prefill-gateway-build]="${{ needs.prefill-gateway-build.result }}"
            [prefill-gateway-tsan]="${{ needs.prefill-gateway-tsan.result }}"
            [cpp-server-gateway-split]="${{ needs.cpp-server-gateway-split.result }}"
            [dynamo-frontend-integration]="${{ needs.dynamo-frontend-integration.result }}"
            [cpp-tsan]="${{ needs.cpp-tsan.result }}"
            [helm-chart-validate]="${{ needs.helm-chart-validate.result }}"
          )
          {
            echo "## Test Gate Results"
            echo ""
            echo "| Job | Result | Notes |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for job in "${JOB_ORDER[@]}"; do
            result="${JOBS[$job]}"
            note=""
            if [[ "$result" == "skipped" ]]; then
              note="$(skipped_reason "$job")"
              echo "✅ $job: skipped ($note)"
            elif [[ "$result" == "success" ]]; then
              echo "✅ $job: $result"
            else
              echo "❌ $job: $result"
              STATUS=1
            fi
            echo "| \`$job\` | \`$result\` | $note |" >> "$GITHUB_STEP_SUMMARY"
          done
          if [[ "$STATUS" -ne 0 ]]; then
            echo "CI gate failed: one or more jobs failed or were cancelled"
            exit 1
          fi
          echo "✅ All checks passed (or were skipped)"
