name: SPDX Header Checker

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - "main"
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: spdx-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-spdx-header-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5.0.0
        with:
          python-version: "3.8"

      - name: Run SPDX Header Script
        run: |
          echo "Running SPDX header script on all files in the repository"
          python ./scripts/add_spdx_header.py

      - name: Check for changes
        id: check_for_changes
        run: |
          git status
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected."
          fi

      - name: Fail pull request when SPDX headers are missing
        if: github.event_name == 'pull_request' && steps.check_for_changes.outputs.changed == 'true'
        run: |
          echo "Missing SPDX headers detected. Please run scripts/add_spdx_header.py and commit the result."
          git --no-pager diff --name-only
          exit 1

      - name: Commit changes
        if: github.event_name != 'pull_request' && steps.check_for_changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_user_name: SPDX-Bot
          commit_user_email: bot@example.com
          commit_message: "🚨✨AUTOMATED COMMIT | Added missing SPDX license headers automatically"
          branch: ${{ github.head_ref }}
          commit_options: "--verbose"
