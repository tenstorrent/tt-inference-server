name: Sync priority labels to Project Priority field

on:
  issues:
    types: [labeled, unlabeled]

permissions:
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: startsWith(github.event.label.name, 'priority:')

    steps:
      - name: Sync priority label to project field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG: tenstorrent
          PROJECT_NUMBER: 354
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          EVENT_ACTION: ${{ github.event.action }}
          CHANGED_LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail

          project_meta=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f org="$ORG" -F number="$PROJECT_NUMBER")

          project_id=$(echo "$project_meta" \
            | jq -r '.data.organization.projectV2.id')

          if [[ -z "$project_id" || "$project_id" == "null" ]]; then
            echo "ERROR: Could not resolve project #$PROJECT_NUMBER for org $ORG" >&2
            exit 1
          fi

          priority_field=$(echo "$project_meta" \
            | jq -r '
              .data.organization.projectV2.fields.nodes[]
              | select((.name // "") | ascii_downcase == "priority")
            ')

          priority_field_id=$(echo "$priority_field" | jq -r '.id')

          if [[ -z "$priority_field_id" || "$priority_field_id" == "null" ]]; then
            echo "ERROR: Could not find a Priority single-select field on project $PROJECT_NUMBER" >&2
            echo "Available fields:" >&2
            echo "$project_meta" | jq -r '.data.organization.projectV2.fields.nodes[].name // empty' >&2
            exit 1
          fi

          # Priority field uses org-standard values: P0 (urgent) / P1 (high) / P2 (medium) / P3 (low)
          option_id_for() {
            local wanted="$1"
            echo "$priority_field" \
              | jq -r --arg w "$wanted" '
                  .options[]
                  | select((.name | ascii_downcase) == ($w | ascii_downcase))
                  | .id
                '
          }

          p1_option_id=$(option_id_for "p1")
          p2_option_id=$(option_id_for "p2")
          p3_option_id=$(option_id_for "p3")

          if [[ -z "$p1_option_id" || "$p1_option_id" == "null" || \
                -z "$p2_option_id" || "$p2_option_id" == "null" || \
                -z "$p3_option_id" || "$p3_option_id" == "null" ]]; then
            echo "ERROR: Could not find P1/P2/P3 options in Priority field" >&2
            echo "Available options:" >&2
            echo "$priority_field" | jq -r '.options[].name' >&2
            exit 1
          fi

          # addProjectV2ItemById is idempotent: returns existing item ID if already tracked
          item_id=$(gh api graphql -f query='
            mutation($project: ID!, $item: ID!) {
              addProjectV2ItemById(input: { projectId: $project, contentId: $item }) {
                item { id }
              }
            }
          ' -f project="$project_id" -f item="$ISSUE_NODE_ID" \
            | jq -r '.data.addProjectV2ItemById.item.id')

          if [[ -z "$item_id" || "$item_id" == "null" ]]; then
            echo "ERROR: Failed to add/locate issue in project" >&2
            exit 1
          fi

          if [[ "$EVENT_ACTION" == "labeled" ]]; then
            case "$CHANGED_LABEL" in
              "priority:high")   target_option_id="$p1_option_id" ;;
              "priority:medium") target_option_id="$p2_option_id" ;;
              "priority:low")    target_option_id="$p3_option_id" ;;
              *)
                echo "Label '$CHANGED_LABEL' is not a mapped priority label — nothing to do."
                exit 0
                ;;
            esac

            gh api graphql -f query='
              mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId:  $project
                  itemId:     $item
                  fieldId:    $field
                  value:      { singleSelectOptionId: $option }
                }) {
                  projectV2Item { id }
                }
              }
            ' -f project="$project_id" \
              -f item="$item_id" \
              -f field="$priority_field_id" \
              -f option="$target_option_id"

            echo "Set Priority to '$CHANGED_LABEL' for issue #${{ github.event.issue.number }}"

          elif [[ "$EVENT_ACTION" == "unlabeled" ]]; then
            remaining=$(gh api \
              "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              --jq '[.[].name | select(startswith("priority:"))] | length')

            if [[ "$remaining" -gt 0 ]]; then
              echo "Another priority label is still present — leaving Priority field unchanged."
              exit 0
            fi

            gh api graphql -f query='
              mutation($project: ID!, $item: ID!, $field: ID!) {
                clearProjectV2ItemFieldValue(input: {
                  projectId: $project
                  itemId:    $item
                  fieldId:   $field
                }) {
                  projectV2Item { id }
                }
              }
            ' -f project="$project_id" \
              -f item="$item_id" \
              -f field="$priority_field_id"

            echo "Cleared Priority field for issue #${{ github.event.issue.number }} (no priority labels remain)"
          fi
