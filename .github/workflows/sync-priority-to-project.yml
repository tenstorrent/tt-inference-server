name: Sync priority labels to Project Priority field

on:
  issues:
    types: [labeled, unlabeled]

permissions:
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: startsWith(github.event.label.name, 'priority:')

    steps:
      - name: Sync priority label to project field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG: tenstorrent
          PROJECT_NUMBER: 354
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          EVENT_ACTION: ${{ github.event.action }}
          CHANGED_LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail

          # Get project ID and the Priority field ID
          project_meta=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                  fields(first: 50) {
                    nodes {
                      __typename
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }
          ' -f org="$ORG" -F number="$PROJECT_NUMBER")

          project_id=$(echo "$project_meta" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['organization']['projectV2']['id'])")

          priority_field_id=$(echo "$project_meta" | python3 -c "
          import sys, json
          fields = json.load(sys.stdin)['data']['organization']['projectV2']['fields']['nodes']
          for f in fields:
              if (f.get('name') or '').lower() == 'priority':
                  print(f.get('id', ''))
                  break
          ")

          echo "DEBUG project_id=$project_id"
          echo "DEBUG priority_field_id=$priority_field_id"

          # Add issue to project (idempotent)
          item_id=$(gh api graphql -f query='
            mutation($project: ID!, $item: ID!) {
              addProjectV2ItemById(input: { projectId: $project, contentId: $item }) {
                item { id }
              }
            }
          ' -f project="$project_id" -f item="$ISSUE_NODE_ID" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['addProjectV2ItemById']['item']['id'])")

          echo "DEBUG item_id=$item_id"

          # Query the item's field values — this reveals option IDs for native issue fields
          # that don't surface via the field schema's options[] array
          echo "DEBUG item field values:"
          gh api graphql -f query='
            query($item: ID!) {
              node(id: $item) {
                ... on ProjectV2Item {
                  fieldValues(first: 30) {
                    nodes {
                      __typename
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                        optionId
                        field { ... on ProjectV2SingleSelectField { name } }
                      }
                    }
                  }
                }
              }
            }
          ' -f item="$item_id" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          fvs = r['data']['node']['fieldValues']['nodes']
          for fv in fvs:
              print(json.dumps(fv))
          "

          # Also: query ALL project items to find any that have Priority set,
          # so we can discover valid option IDs even if this issue has none yet
          echo "DEBUG scanning project items for existing Priority values:"
          gh api graphql -f query='
            query($project: ID!, $field: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  items(first: 20) {
                    nodes {
                      fieldValueByName(name: "Priority") {
                        __typename
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          optionId
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f project="$project_id" -f field="$priority_field_id" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          items = r['data']['node']['items']['nodes']
          for item in items:
              fv = item.get('fieldValueByName')
              if fv and fv.get('optionId'):
                  print(json.dumps(fv))
          "
