name: Sync priority labels to Project Priority field

on:
  issues:
    types: [labeled, unlabeled]

permissions:
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: startsWith(github.event.label.name, 'priority:')

    steps:
      - name: Sync priority label to Issue Priority field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG: tenstorrent
          REPO: afuller-sandbox
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
          CHANGED_LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail

          # Resolve label → option name
          case "$CHANGED_LABEL" in
            "priority:high")   target_option="High"   ;;
            "priority:medium") target_option="Medium"  ;;
            "priority:low")    target_option="Low"     ;;
            *)
              echo "Label '$CHANGED_LABEL' is not a mapped priority — nothing to do."
              exit 0
              ;;
          esac

          # Get org issue fields (2026-03-10 API)
          issue_fields=$(gh api "orgs/$ORG/issue-fields" \
            -H "X-GitHub-Api-Version: 2026-03-10")

          echo "DEBUG issue_fields: $issue_fields"

          priority_field_id=$(echo "$issue_fields" | python3 -c "
          import sys, json
          fields = json.load(sys.stdin)
          for f in (fields if isinstance(fields, list) else fields.get('issue_fields', [])):
              if f.get('name', '').lower() == 'priority':
                  print(f['id'])
                  raise SystemExit(0)
          " 2>/dev/null || echo "")

          echo "DEBUG priority_field_id=$priority_field_id"

          if [[ -z "$priority_field_id" || "$priority_field_id" == "null" ]]; then
            echo "ERROR: Could not find Priority field in org issue fields" >&2
            exit 1
          fi

          option_id=$(echo "$issue_fields" | python3 -c "
          import sys, json, os
          wanted = os.environ['target_option'].lower()
          fields = json.load(sys.stdin)
          for f in (fields if isinstance(fields, list) else fields.get('issue_fields', [])):
              if f.get('name', '').lower() == 'priority':
                  for opt in f.get('options', []):
                      if opt.get('name', '').lower() == wanted:
                          print(opt['id'])
                          raise SystemExit(0)
          " target_option="$target_option" 2>/dev/null || echo "")

          echo "DEBUG option_id=$option_id"

          if [[ -z "$option_id" || "$option_id" == "null" ]]; then
            echo "ERROR: Could not find option '$target_option' in Priority field" >&2
            exit 1
          fi

          if [[ "$EVENT_ACTION" == "labeled" ]]; then
            gh api "repos/$ORG/$REPO/issues/$ISSUE_NUMBER" \
              --method PATCH \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              --input - <<JSON
            {"issue_field_values": [{"field_id": $priority_field_id, "value": $option_id}]}
JSON
            echo "Set Priority='$target_option' on issue #$ISSUE_NUMBER"

          elif [[ "$EVENT_ACTION" == "unlabeled" ]]; then
            remaining=$(gh api "repos/$ORG/$REPO/issues/$ISSUE_NUMBER/labels" \
              --jq '[.[].name | select(startswith("priority:"))] | length')

            if [[ "$remaining" -gt 0 ]]; then
              echo "Another priority label is still present — leaving Priority field unchanged."
              exit 0
            fi

            gh api "repos/$ORG/$REPO/issues/$ISSUE_NUMBER" \
              --method PATCH \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              --input - <<JSON
            {"issue_field_values": [{"field_id": $priority_field_id, "value": null}]}
JSON
            echo "Cleared Priority on issue #$ISSUE_NUMBER"
          fi
