name: Sync priority labels to Project Priority field

on:
  issues:
    types: [labeled, unlabeled]

permissions:
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: startsWith(github.event.label.name, 'priority:')

    steps:
      - name: Sync priority label to project field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG: tenstorrent
          PROJECT_NUMBER: 354
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          EVENT_ACTION: ${{ github.event.action }}
          CHANGED_LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail

          project_meta=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                  fields(first: 50) {
                    nodes {
                      __typename
                      ... on ProjectV2Field {
                        id
                        name
                        dataType
                      }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                      ... on ProjectV2IterationField {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          ' -f org="$ORG" -F number="$PROJECT_NUMBER")

          project_id=$(echo "$project_meta" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['organization']['projectV2']['id'])")

          if [[ -z "$project_id" || "$project_id" == "null" ]]; then
            echo "ERROR: Could not resolve project #$PROJECT_NUMBER for org $ORG" >&2
            exit 1
          fi

          echo "DEBUG project_id=$project_id"

          echo "DEBUG all fields (typename + full data):"
          echo "$project_meta" | python3 -c "
          import sys, json
          fields = json.load(sys.stdin)['data']['organization']['projectV2']['fields']['nodes']
          for f in fields:
              print(json.dumps(f, indent=2))
          "
