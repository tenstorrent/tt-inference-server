name: GitHub Actions Lint

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/actionlint.yaml"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          # Start with workflow/expression validation; embedded ShellCheck can
          # be enabled after existing workflow shell findings are cleaned up.
          args: -shellcheck= -verbose
