name: "[internal] Collect workflow data"
run-name: "Collect data for run_id ${{ github.event.workflow_run.id || inputs.run_id || 'manual' }} attempt ${{ github.event.workflow_run.run_attempt || inputs.run_attempt || 1 }}"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID"
        required: false
        type: string
        default: ""
      run_attempt:
        description: "Run attempt"
        required: false
        type: number
        default: 1
  workflow_run:
    workflows:
      - 'Nightly C\+\+ Server Benchmarks'
    types:
      - completed

jobs:
  produce-cicd-data:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Collect CI/CD data
        uses: tenstorrent/tt-github-actions/.github/actions/collect_data@main
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.run_id != '') }}
        with:
          repository: ${{ github.repository }}
          run_id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.run_id }}
          run_attempt: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.run_attempt || inputs.run_attempt }}
          sftp_host: ${{ secrets.SFTP_CICD_WRITER_HOSTNAME }}
          sftp_user: ${{ secrets.SFTP_CICD_WRITER_USERNAME }}
          sftp_perf_host: ${{ secrets.SFTP_PERF_WRITER_HOSTNAME }}
          sftp_perf_user: ${{ secrets.SFTP_PERF_WRITER_USERNAME }}
          ssh-private-key: ${{ secrets.SFTP_CICD_WRITER_KEY }}
