name: Create Prerelease (entrypoint for the release process)

run-name: ${{ format('Create pre-release from Models CI run {0}', inputs.release-model-ci-run-id) }}

on:
  workflow_dispatch:
    inputs:
      release-model-ci-run-id:
        description: "Run ID of the release.yml workflow run (from tt-shield repo)"
        required: true
        type: string
      release-increment:
        description: "Version increment type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  actions: read
  contents: write
  packages: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.TMP_VMAKSIMOVICTT_PAT }}
  FEATURE_BRANCH: vmaksimovic/move_release_process_to_inference

jobs:
  check-prerequisites:
    runs-on: ubuntu-latest
    steps:
      - name: Check release increment input
        run: |
          INCREMENT="${{ inputs.release-increment }}"

          if [[ "$INCREMENT" != "patch" && "$INCREMENT" != "minor" && "$INCREMENT" != "major" ]]; then
            echo "❌ Error: Invalid release increment: $INCREMENT"
            echo "Valid options are: patch, minor, major"
            exit 1
          fi

          echo "✓ Release increment validated: $INCREMENT"

      - name: Check if workflow run exists and is of correct type
        run: |
          set +e

          RUN_ID="${{ inputs.release-model-ci-run-id }}"

          RUN_INFO=$(gh api repos/tenstorrent/tt-shield/actions/runs/$RUN_ID 2>&1)
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Error: Workflow run $RUN_ID not found or not accessible."
            echo "$RUN_INFO"
            exit 1
          fi

          WORKFLOW_PATH=$(echo "$RUN_INFO" | jq -r '.path // empty')
          if [ -z "$WORKFLOW_PATH" ] || [ "$WORKFLOW_PATH" = "null" ]; then
            echo "❌ Error: Could not determine workflow path from run $RUN_ID"
            exit 1
          fi

          if [[ "$WORKFLOW_PATH" != *"release.yml"* ]]; then
            echo "❌ Error: Workflow run $RUN_ID is not of type 'on-release-candidates.yml'"
            echo "Found: $WORKFLOW_PATH"
            exit 1
          fi

          echo "✓ Workflow run $RUN_ID verified as 'on-release-candidates.yml'"

  get-tt-inference-commit:
    needs: check-prerequisites
    runs-on: ubuntu-latest
    outputs:
      tt-inference-commit: ${{ steps.extract-metadata.outputs.tt-inference-server-commit }}
      tt-inference-branch: ${{ steps.verify-head.outputs.branch-name }}
    steps:
      - name: Download artifacts
        id: download

        run: |
          set -e

          RUN_ID="${{ inputs.release-model-ci-run-id }}"
          REPO="tenstorrent/tt-shield"
          OUTPUT_DIR="${{ github.workspace }}/artifacts"

          mkdir -p "$OUTPUT_DIR"

          echo "📥 Searching for tt-inference-server build metadata artifact from run $RUN_ID..."

          # Find the build metadata artifact (name starts with "tt-inference-server-build-")
          ARTIFACT=$(gh api repos/$REPO/actions/runs/$RUN_ID/artifacts --paginate --jq '.artifacts[] | select(.name | startswith("tt-inference-server-build-"))' | jq -s '.[0]')

          ARTIFACT_ID=$(echo "$ARTIFACT" | jq -r '.id // empty')
          ARTIFACT_NAME=$(echo "$ARTIFACT" | jq -r '.name // empty')

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "❌ Error: No artifact matching 'tt-inference-server-build-*' found in run $RUN_ID"
            exit 1
          fi

          echo "✓ Found artifact: $ARTIFACT_NAME (ID: $ARTIFACT_ID)"

          ARTIFACT_DIR="$OUTPUT_DIR/$ARTIFACT_NAME"
          mkdir -p "$ARTIFACT_DIR"
          ARTIFACT_ZIP="$ARTIFACT_DIR/$ARTIFACT_NAME.zip"

          gh api repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip > "$ARTIFACT_ZIP"
          unzip -q -o "$ARTIFACT_ZIP" -d "$ARTIFACT_DIR"
          rm -f "$ARTIFACT_ZIP"
          echo "✓ Extracted: $ARTIFACT_NAME"

          echo "artifacts_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Extract build metadata
        id: extract-metadata
        run: |
          ARTIFACTS_DIR="${{ steps.download.outputs.artifacts_dir }}"

          # Find tt-inference-server build metadata
          echo "Searching for build metadata in: $ARTIFACTS_DIR"
          echo "Directory contents:"
          find "$ARTIFACTS_DIR" -type f | head -n 50

          TT_JSON=$(find "$ARTIFACTS_DIR" -path "*tt-inference-server-build-*/*.json" -type f | head -n 1)

          if [ -z "$TT_JSON" ]; then
            echo "❌ Error: No tt-inference-server build metadata JSON found in artifacts"
            exit 1
          fi

          echo "✓ Found metadata file: $TT_JSON"

          if [ -n "$TT_JSON" ]; then
            TT_METAL_COMMIT=$(jq -r '.["tt-metal-commit"] // empty' "$TT_JSON")
            TT_INFERENCE_COMMIT=$(jq -r '.["tt-inference-server-commit"] // empty' "$TT_JSON")

            # Resolve to full SHA
            if [ -n "$TT_INFERENCE_COMMIT" ]; then
              FULL_SHA=$(gh api repos/tenstorrent/tt-inference-server/commits/$TT_INFERENCE_COMMIT --jq '.sha' 2>/dev/null || echo "$TT_INFERENCE_COMMIT")
              TT_INFERENCE_COMMIT="$FULL_SHA"
            fi

            echo "tt-metal-commit=$TT_METAL_COMMIT" >> "$GITHUB_OUTPUT"
            echo "tt-inference-server-commit=$TT_INFERENCE_COMMIT" >> "$GITHUB_OUTPUT"

            echo "✓ Extracted metadata:"
            echo "  tt-metal-commit: $TT_METAL_COMMIT"
            echo "  tt-inference-server-commit: $TT_INFERENCE_COMMIT"
          fi

      - name: Verify commit is HEAD of a branch
        id: verify-head
        run: |
          COMMIT="${{ steps.extract-metadata.outputs.tt-inference-server-commit }}"

          BRANCHES=$(gh api repos/tenstorrent/tt-inference-server/commits/$COMMIT/branches-where-head --jq '[.[].name]')

          COUNT=$(echo "$BRANCHES" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ Error: Commit $COMMIT is not the HEAD of any branch in tt-inference-server"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "❌ Error: Commit $COMMIT is the HEAD of multiple branches: $(echo "$BRANCHES" | jq -r 'join(", ")')"
            echo "Expected exactly 1 branch"
            exit 1
          fi

          BRANCH_NAME=$(echo "$BRANCHES" | jq -r '.[0]')

          echo "✓ Commit $COMMIT is HEAD of $COUNT branch(es): $(echo "$BRANCHES" | jq -r 'join(", ")')"
          echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

