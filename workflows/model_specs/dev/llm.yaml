# Model spec catalog: LLM templates.
# Edit this file to add or modify a LLM model spec.
# Schema: workflows/model_spec.py (ModelSpecTemplate, DeviceModelSpec).
templates:
# =============================================================================
# LLM templates
# =============================================================================
- weights:
    - openai/gpt-oss-20b
  impl: gpt_oss
  version: "0.10.0"
  tt_metal_commit: e867533
  vllm_commit: 8f36910
  inference_engine: VLLM
  device_model_specs:
    - device: T3K
      max_concurrency: 1
      max_context: 16384  # 16 * 1024
      default_impl: true
      env_vars:
        VLLM_ENABLE_RESPONSES_API_STORE: 1
        VLLM_GPT_OSS_HARMONY_SYSTEM_INSTRUCTIONS: 1
    - device: GALAXY_T3K
      max_concurrency: 1
      max_context: 16384  # 16 * 1024
      default_impl: true
      env_vars:
        TT_MESH_GRAPH_DESC_PATH: "../../tt-metal/tt_metal/fabric/mesh_graph_descriptors/t3k_mesh_graph_descriptor.textproto"
    - device: GALAXY
      max_concurrency: 128  # 32 * 4
      max_context: 131072  # 128 * 1024
      default_impl: true
      env_vars:
        MESH_DEVICE: "(4, 8)"  # Override default TG->(8,4) to use (4,8) mesh grid
      vllm_args:
        data_parallel_size: 4
  status: EXPERIMENTAL
  has_builtin_warmup: true
  env_vars:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  metadata:
    openai/gpt-oss-20b:
      reasoning_parser_name: openai_gptoss
      tool_call_parser_name: openai

- weights:
    - openai/gpt-oss-120b
  impl: gpt_oss
  version: "0.12.0"
  tt_metal_commit: 805f43d
  vllm_commit: a45c614
  inference_engine: VLLM
  device_model_specs:
    - device: T3K
      max_concurrency: 1
      max_context: 16384  # 16 * 1024
      default_impl: true
      tensor_cache_timeout: 5400.0
      override_tt_config:
        trace_region_size: 134217728  # 128 MB; vLLM default 50 MB is too small for long prefill
    - device: GALAXY
      max_concurrency: 32  # currently limiting client-side max_concurrency=32 to allow workflows to
      # complete else they will timeout due to hitting the vLLM RPC recv 30min timeout
      max_context: 131072  # 128 * 1024
      default_impl: true
      tensor_cache_timeout: 5400.0
      env_vars:
        MESH_DEVICE: "(4, 8)"  # Override default TG->(8,4) to use (4,8) mesh grid
        TT_MM_THROTTLE_PERF: 2
      vllm_args:
        data_parallel_size: 4
        max_num_seqs: 32  # override the default inferred by max_concurrency
      override_tt_config:
        sample_on_device_mode: all
        trace_region_size: 134217728  # 128 MB; vLLM default 50 MB is too small for long prefill
  status: EXPERIMENTAL
  has_builtin_warmup: true
  env_vars:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  metadata:
    openai/gpt-oss-120b:
      reasoning_parser_name: openai_gptoss
      tool_call_parser_name: openai

