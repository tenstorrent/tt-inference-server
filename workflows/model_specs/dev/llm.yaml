- weights:
    - Qwen/Qwen3.6-27B
  impl: qwen3_6_galaxy
  version: "0.11.1"  # must be >= run.py floor v0.11.0
  tt_metal_commit: fa021238662
  vllm_commit: 8f36910  # Llama70B-galaxy pin (plugin-matched era; same Generator base)
  inference_engine: VLLM
  device_model_specs:
    - device: BLACKHOLE_GALAXY
      max_concurrency: 1  # batch-1: max_batch_size=32 L1-OOMs the per-batch
      # activation buffers at 256k; warmup is skipped + host sampling used
      max_context: 262144  # 256 * 1024
      default_impl: true
      vllm_args:
        trust_remote_code: true
        # vLLM's runner/multimodal checks resolve `architectures` to a NATIVE
        # vLLM class BEFORE the plugin's TT prefix is applied. qwen3_5 isn't a
        # native generative arch, so present native Qwen3ForCausalLM (Qwen3.6 is
        # Qwen3-family text): native => generative + non-multimodal => passes the
        # `--runner generate` check. The platform then prepends TT ->
        # TTQwen3ForCausalLM, which the plugin maps to our qwen3.6 TT class.
        hf_overrides: '{"architectures": ["Qwen3ForCausalLM"]}'
      override_tt_config:
        # Run eager: the worker defaults trace_mode=True, but the DeltaNet GDN
        # chunk kernel under trace-capture prefill hits an L1/CB clash (V2-9
        # trace-capture is a known blocker). Eager prefill/decode are known-good.
        trace_mode: false
        # Match the demo's fabric (text_demo_qwen36 set_fabric_config FABRIC_1D_RING);
        # the distributed-norm all_gather_async hangs under the wrong fabric.
        fabric_config: FABRIC_1D_RING
      env_vars:
        VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
        # Use the ttnn chunk GDN prefill kernel, not the C++ seq parallel-scan
        # kernel (QWEN36_GDN_SEQ_PREFILL default 1), whose static circular
        # buffers clash with L1 on the head cores during prefill.
        QWEN36_GDN_SEQ_PREFILL: "0"
        # Decode L1-residual contract (the "verified at 64L" decode path). Required:
        # the decode CCL pre-allocates an L1 width-sharded LAYERNORM stats buffer
        # (llama_ccl.get_all_gather_buffers), so the decode RMSNorm MUST run the
        # decode-mode sharded primitive (norm_mlp_mode="decode" -> fused_rms_minimal),
        # not the prefill tt_distributed_rmsnorm (which passes a DRAM memcfg and
        # collides with the L1 buffer -> all_gather_async output-memcfg FATAL).
        # This flag also enables the 32-row carry the decode rms_allgather needs.
        QWEN36_DECODE_L1_RESIDUAL: "1"
        # Batch-1 must take the decode-mode final norm + lm_head tail (Path A in
        # TtTransformer.forward). The generator calls switch_mode("decode") so the
        # model runs on the decode CCL; without FORCE_SWITCH_DECODE the batch-1
        # path falls through to the prefill _carry32 tail (tt_distributed_rmsnorm),
        # which collides with the decode CCL's L1 LAYERNORM buffer -> all_gather_async
        # output-memcfg FATAL. =1 routes batch-1 onto the unified decode tail (the
        # combo the perf test / demo use: switch_mode + L1_RESIDUAL + FORCE_SWITCH).
        QWEN36_FORCE_SWITCH_DECODE: "1"
  status: EXPERIMENTAL
  has_builtin_warmup: true
  metadata:
    Qwen/Qwen3.6-27B:
      reasoning_parser_name: qwen3
      tool_call_parser_name: hermes
