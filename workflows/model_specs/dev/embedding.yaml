# Model spec catalog: Embedding templates.
# Edit this file to add or modify a Embedding model spec.
# Schema: workflows/model_spec.py (ModelSpecTemplate, DeviceModelSpec).
templates:
# =============================================================================
# Embedding templates
# =============================================================================
- weights:
    - BAAI/bge-large-en-v1.5
  impl: tt_vllm_plugin
  min_disk_gb: 15
  min_ram_gb: 6
  model_type: EMBEDDING
  inference_engine: MEDIA
  device_model_specs:
    - device: N150
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
      env_vars:
        VLLM__MAX_NUM_BATCHED_TOKENS: "3072"
        VLLM__MAX_MODEL_LENGTH: "384"
        VLLM__MIN_CONTEXT_LENGTH: "32"
        VLLM__MAX_NUM_SEQS: "8"
        MAX_BATCH_SIZE: "8"
        DEFAULT_THROTTLE_LEVEL: "0"
    - device: N300
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
      env_vars:
        VLLM__MAX_NUM_BATCHED_TOKENS: "6144"
        VLLM__MAX_MODEL_LENGTH: "384"
        VLLM__MIN_CONTEXT_LENGTH: "32"
        VLLM__MAX_NUM_SEQS: "16"
        MAX_BATCH_SIZE: "16"
        DEFAULT_THROTTLE_LEVEL: "0"
    - device: T3K
      max_concurrency: 4
      max_context: 65536  # 64 * 1024
      default_impl: true
      env_vars:
        VLLM__MAX_NUM_BATCHED_TOKENS: "6144"
        VLLM__MAX_MODEL_LENGTH: "384"
        VLLM__MIN_CONTEXT_LENGTH: "32"
        VLLM__MAX_NUM_SEQS: "16"
        MAX_BATCH_SIZE: "16"
        DEFAULT_THROTTLE_LEVEL: "0"
    - device: GALAXY
      max_concurrency: 32
      max_context: 65536  # 64 * 1024
      default_impl: true
      env_vars:
        VLLM__MAX_NUM_BATCHED_TOKENS: "3072"
        VLLM__MAX_MODEL_LENGTH: "384"
        VLLM__MIN_CONTEXT_LENGTH: "32"
        VLLM__MAX_NUM_SEQS: "8"
        MAX_BATCH_SIZE: "8"
        DEFAULT_THROTTLE_LEVEL: "0"
        # Disable Inspector RPC to prevent port conflicts with 32 concurrent workers
        # Each worker would otherwise try to bind to the same port (50051)
        TT_METAL_INSPECTOR_RPC: "0"

