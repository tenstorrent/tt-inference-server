# =============================================================================
# tt_symbiote-ported VLM templates
# -----------------------------------------------------------------------------
# These models are served via the tt_symbiote library (HuggingFace-shaped TTNN
# package), wrapped by the vLLM Generator adapter in
# vllm-tt-metal/src/tt_symbiote_generators.py. The pinned tt_metal_commit MUST
# match tt_symbiote RUNTIME_PINS for the model's HF architecture; ttnn is
# source-built from that commit and tt_symbiote (0.1.5+, which has no ttnn dep)
# installed on top.
# =============================================================================
- weights:
    - rednote-hilab/dots.ocr
  impl: tt_symbiote
  inference_engine: VLLM
  model_type: VLM
  # NOTE: `version` is the tt-inference-server IMAGE version (gated >= 0.11.0,
  # used in the image tag) — NOT the tt_symbiote library version. Omitted here so
  # it defaults to the current tt-inference-server VERSION. The tt_symbiote pip
  # version lives in `metadata` below and is read by build_docker_images.py.
  # == tt_symbiote RUNTIME_PINS["DotsOCRForCausalLM"]["tt_metal_commit"] ==
  tt_metal_commit: c09f09c35a1a59a428f0e1b5cdaa8fe59fb1b195
  # Tenstorrent vLLM fork commit compatible with the tt-metal commit above.
  # Pinned to the commit that adds tt_symbiote model registration to the
  # `register_tt_models` vllm.general_plugins hook (branch
  # adam/tt_symbiote-integration). That hook runs in EVERY process the `tt`
  # platform loads — including the vLLM v1 engine-core subprocess — so the
  # tt_symbiote multimodal class (with `_processor_factory`) is registered there,
  # not just in the API-server parent. Without this commit the engine worker hits
  # a MULTIMODAL_REGISTRY assertion on startup. Parent of this commit is 7678b70
  # (origin/stable); the only delta is the registration block.
  vllm_commit: cdb395febdc9caaeba6d82e283329366ac9c2d89
  device_model_specs:
    - device: T3K
      # S2_PAGED (default) continuous batching: each of the 8 T3K DP streams
      # serves one INDEPENDENT vLLM sequence over the paged KV cache, so vLLM can
      # batch up to 8 in flight (W1 logits forward + TS-1/2/3 page-table hook +
      # per-DP-stream positions). Start at 8 (= DP streams); the practical ceiling
      # is KV-budget bound (bf16 KV + large vision prompt, design doc §8.2) so
      # fewer may fit -- measure during validation and lower if KV OOMs.
      # The validated S0 single-stream greedy bridge stays reachable without
      # editing this spec via TT_SYMBIOTE_SERVING_TIER=DotsOCRForCausalLM=S0_GREEDY_ENGINE
      # (then drop max_concurrency/max-num-seqs back to 1).
      max_concurrency: 8
      # TS-7: dots.ocr S2 prefill can now chunk over the paged KV (the adapter
      # loops the eager chunked SDPA when a prompt exceeds max_num_batched_tokens;
      # see _prefill_s2). max_context drives BOTH max_model_len and
      # max_num_batched_tokens (workflows/model_spec.py); the latter is the
      # adapter's chunk budget (snapped to a 256-multiple). The prefill length is
      # set by the request, not by max_context: the validated 1848x1176 grid is
      # (84,132)=11088 patches -> 2772 image tokens, well under the budget, so
      # typical OCR prefills stay single-shot (traced); only oversized prompts
      # chunk. (A non-chunked prefill of >=4096 tokens otherwise overflows L1 --
      # TT_THROW program.cpp:934 circular-buffer/L1 clash.)
      #
      # max_num_batched_tokens ALSO sizes the vision tower's activation buffers.
      # Every sample_doc is 1848x1176 -> 11088 patches, padded to 11264 (=1408 x 8
      # mesh rows) on T3K. Setting max_context to that exact padded vision sequence
      # makes max_num_batched_tokens match the input geometry, so the vision
      # matmuls shard 1408 rows/core instead of over-allocating to 1536 (=12288/8).
      # That removes the per-op "Mismatch between computed/provided MemoryConfig
      # ... Using computed config" warnings and the extra padded vision compute.
      # Decode budget is still 11264 - 2772 ~= 8.5k tokens, far above the demo
      # client's 512-token cap. A request whose prefill exceeds the chunk budget
      # (larger images / long text) is now segmented by the TS-7 chunked prefill
      # path instead of overflowing L1.
      max_context: 11264       # 1408 x 8: matches the sample_docs padded vision seq
      default_impl: true
      env_vars:
        # tt_symbiote's dots.ocr is laid out data-parallel on T3K and its
        # @run_on_devices(T3K, mesh_shape=(8, 1)) guard requires the live mesh to
        # be (8, 1). vLLM's TT platform opens the mesh from MESH_DEVICE; the
        # default "T3K" maps to (1, 8) (tensor-parallel), so override to the
        # (8, 1) DP layout the model expects. tt-metal/vLLM accept MESH_DEVICE as
        # a literal shape tuple (same convention the TG specs use for "(4, 8)").
        MESH_DEVICE: "(8, 1)"
        # Prefix caching is DISABLED for dots.ocr. The pipeline's paged cache
        # resets its (global, per-layer) sequence bookkeeping on every prefill and
        # broadcasts each request's full KV to all DP streams, so it cannot honor a
        # vLLM prefix-cache hit (a skipped prefix would be unaccounted for and
        # corrupt continuous batching). The generator advertises
        # supports_prefix_caching=False for DotsOCRForCausalLM, which makes the TT
        # platform turn prefix caching off regardless of this flag; kept at 0 for
        # clarity. (Re-enabling needs per-stream seq counters + a prefix-aware
        # broadcast prefill -- a follow-up to the M2 continuous-batching work.)
        TT_ENABLE_PREFIX_CACHING: "0"
        # tt_symbiote binds its run implementation from TT_SYMBIOTE_RUN_MODE at
        # import (core/run_config.py: default is "NORMAL" = NormalRun, per-module
        # EAGER dispatch with NO device-trace capture/replay). The standalone e2e
        # (examples/e2e/dots_ocr/run_dots_ocr.py:48) sets "TRACED" so the pipeline
        # runs warmup -> capture -> replay; that traced decode is the ~10x faster
        # production path. Without this the server defaulted to NORMAL, which is the
        # eager, op-by-op decode behind the ~35s/image latency. run_vllm_api_server
        # applies these env_vars (set_runtime_env_vars) before launching vLLM, so
        # the EngineCore subprocess inherits TRACED at tt_symbiote import time.
        TT_SYMBIOTE_RUN_MODE: "TRACED"
        # S2_PAGED continuous batching REQUIRES the data-parallel pipeline:
        # DOTS_OCR_PARALLELISM=DP makes recipe.py::_pipeline_batch_size return
        # batch=num_devices=8, i.e. one INDEPENDENT vLLM sequence per chip. The
        # S2 adapter drives pipeline.forward_logits_prefill/decode with one row
        # per DP stream (set_vllm_page_table + per-stream cache positions), so the
        # pipeline batch MUST equal the 8 DP streams. (The (8, 1) MESH_DEVICE above
        # only selects the DP weight LAYOUT; this var selects the pipeline BATCH.)
        # For the S0 single-stream fallback
        # (TT_SYMBIOTE_SERVING_TIER=DotsOCRForCausalLM=S0_GREEDY_ENGINE), drop this
        # var so the pipeline builds batch=1 (the S0 bridge feeds one stream).
        DOTS_OCR_PARALLELISM: "DP"
        # Select the S2_PAGED serving tier EXPLICITLY. The adapter's tier comes from
        # tt_symbiote's model-authoritative pin (serving_tier_for), whose default for
        # DotsOCRForCausalLM is S0_GREEDY_ENGINE; S2 is an opt-in override
        # (tt_symbiote_generators.get_serving_recipes). DOTS_OCR_PARALLELISM=DP above
        # builds the batch=8 DP pipeline, but WITHOUT this override the adapter serves
        # via the S0 single-stream path (batch=1) and the pipeline's prefill rejects
        # the mismatch: "DP batch-parallel prefill expects input_ids batch 8, got 1"
        # -> EngineCore dies on the first request. Pin S2 so the tier and the pipeline
        # batch agree. (Do NOT rely on the package default matching: a freshly pulled
        # image may pin S0.)
        TT_SYMBIOTE_SERVING_TIER: "DotsOCRForCausalLM=S2_PAGED"
      vllm_args:
        # dots.ocr ships custom modeling code on the HF Hub, so vLLM's
        # ModelConfig requires trust_remote_code to load it.
        trust-remote-code: true
        mm-processor-cache-gb: 0
        limit-mm-per-prompt: '{"image": 1}'
        # S2_PAGED default: vLLM continuous batching. max-num-seqs is the in-flight
        # sequence budget; 8 = the T3K DP-stream count (one sequence per chip).
        # Keep temperature 0 / greedy for TOKEN PARITY with the validated S0 OCR
        # output (design doc §8.5): for M1, tt_symbiote S2 returns logits and vLLM
        # samples them on host at temperature 0 (greedy argmax == S0). To fall back
        # to the S0 single-stream bridge, set
        #   TT_SYMBIOTE_SERVING_TIER=DotsOCRForCausalLM=S0_GREEDY_ENGINE
        # and drop max-num-seqs (and max_concurrency above) back to 1.
        # See docs/dots_ocr_s2_migration_design.md and tt_symbiote_generators
        # get_serving_recipes().
        max-num-seqs: 8
        # Match the pipeline's paged-cache block size (PagedAttentionConfig
        # block_size=64). The S2 adapter reuses the pipeline's own device cache and
        # validates vLLM's KV geometry against it (_validate_pipeline_kv_geometry),
        # so the vLLM block manager MUST page at 64-token blocks. This also makes
        # TS-8's num_computed_tokens 64-aligned, satisfying the chunked-SDPA
        # q_chunk divisibility for the suffix chunk starts.
        block-size: 64
        # Prefix caching disabled (see TT_ENABLE_PREFIX_CACHING note above): the
        # dots.ocr pipeline cannot honor skipped prefixes under its reset-on-prefill
        # paged cache. The generator's supports_prefix_caching=False capability
        # forces this off in the TT platform regardless; set false for clarity.
        enable-prefix-caching: false
      override_tt_config:
        # dots.ocr captures large prefill+decode traces; matches the e2e demo's
        # ttnn.open_mesh_device(trace_region_size=200_000_000).
        trace_region_size: 200000000
        # NOTE (S2): on-device sampling is NOT wired for the tt_symbiote S2 logits
        # path. forward_logits_prefill/decode return host logits [B, vocab] and
        # vLLM samples on host EVERY step (prefill AND decode). The key is left
        # UNSET (resolves to sample_on_device_mode=None) on purpose: decode_only
        # would route the decode step to the "model returns pre-sampled tokens"
        # branch, but dots.ocr decode returns logits, so host sampling must run on
        # decode too. Host-step sampling is also what enables TS-10 anti-repetition
        # / penalties (repetition/presence/frequency penalties + min_p applied to
        # the returned logits before greedy/top-p-top-k; greedy at temperature 0
        # stays byte-for-byte == S0 parity when no penalties are requested).
        # Moving argmax/sampling back on-device (skipping the per-token logits d2h)
        # is the deferred latency optimization (design doc §8).
        # sample_on_device_mode: <unset -> host sampling every step>
  status: EXPERIMENTAL
  # Skip tt-inference-server's generic background trace-capture sweep. That sweep
  # (utils/prompt_client.py::DEFAULT_IMAGE_RESOLUTIONS = [(512,512),(512,1024),
  # (1024,512),(1024,1024)]) feeds arbitrary image resolutions to the model. The
  # tt_symbiote dots.ocr vision tower is only tuned for the validated patch grid
  # (84,132)=11088 patches (box 1848x1176); off-grid resolutions select an
  # untuned vision-SDPA program config whose static circular buffers overflow L1
  # (TT_THROW program.cpp:925, >1.5 MB) and crash EngineCore during warmup.
  # Instead, rely on tt_symbiote's lazy trace capture: the vision/decode traces
  # are captured on the FIRST real request for that request's exact geometry —
  # the same path the standalone e2e (examples/e2e/dots_ocr/run_dots_ocr.py)
  # validates. Requests should resize images to the (84,132) grid until the
  # vision tower's SDPA buckets cover arbitrary resolutions.
  has_builtin_warmup: true
  env_vars:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  supported_modalities:
    - text
    - image
  metadata:
    rednote-hilab/dots.ocr:
      # tt_symbiote pip version installed into the image (build_docker_images.py
      # reads this; default index is the production PyPI — see the Dockerfile note).
      tt_symbiote_version: "0.1.7"
