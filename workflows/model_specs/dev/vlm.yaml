  tt_metal_commit: aecd1d7
  vllm_commit: 0da90eb
  inference_engine: VLLM
  device_model_specs:
    - device: N150
      max_concurrency: 32
      max_context: 131072  # 128 * 1024
      default_impl: true
      vllm_args:
        limit-mm-per-prompt: '{"image": 10}'
        mm-processor-cache-gb: 0
      override_tt_config:
        l1_small_size: 4096
        fabric_config: FABRIC_1D
    - device: N300
