- weights:
    - Qwen/Qwen3-4B
  impl: forge_vllm_plugin
  min_disk_gb: 15
  min_ram_gb: 8
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  device_model_specs:
    - device: P150
      max_concurrency: 4
      max_context: 16384
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "16384"
        MAX_NUM_SEQS: "4"
        GPU_MEMORY_UTILIZATION: "0.35"
        TT_KV_POOL_GB: "32"
        OPTIMIZATION_LEVEL: "1"
        ENABLE_TRACE: "true"

