# Model spec catalog: CNN templates.
# Edit this file to add or modify a CNN model spec.
# Schema: workflows/model_spec.py (ModelSpecTemplate, DeviceModelSpec).
templates:
# =============================================================================
# CNN templates
# =============================================================================
- weights:
    - Qwen/Qwen3-4B
  impl: forge_vllm_plugin
  min_disk_gb: 15
  min_ram_gb: 8
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  device_model_specs:
    - device: P150
      max_concurrency: 32
      max_context: 40960  # Qwen3 native max_position_embeddings
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "40960"
        MAX_NUM_SEQS: "32"
        GPU_MEMORY_UTILIZATION: "0.5"
        TT_KV_POOL_GB: "32"
        OPTIMIZATION_LEVEL: "1"
        CPU_SAMPLING: "false"
        ENABLE_TRACE: "true"
        KV_CACHE_DTYPE: "bfp_bf8"
        PREFILL_CHUNK_SIZE: "1024"
        MIN_NUM_SEQS: "1"  # b1-prefill: compile [1,n] graph alongside [32,n] (tt-xla #5281)
        PREFILL_BATCH_THRESHOLD: "16"  # route <=16 pending prefills to b1, serially

