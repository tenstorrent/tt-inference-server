- weights:
    - tiiuae/Falcon3-7B-Instruct
  impl: forge_vllm_plugin
  min_disk_gb: 20
  min_ram_gb: 12
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  device_model_specs:
    - device: P150
      max_concurrency: 32
      max_context: 32768  # Falcon3 native max_position_embeddings
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "32768"
        MAX_NUM_SEQS: "32"
        GPU_MEMORY_UTILIZATION: "0.35"
        TT_KV_POOL_GB: "32"
        OPTIMIZATION_LEVEL: "1"
        CPU_SAMPLING: "false"
        ENABLE_TRACE: "true"
        KV_CACHE_DTYPE: "bfp_bf8"
        # 1024 (not 2048): Falcon3 head_dim=256 makes the b32 prefill SDPA buffer
        # DRAM-OOM at chunk 2048 during trace-capture.
        PREFILL_CHUNK_SIZE: "1024"
        MIN_NUM_SEQS: "1"  # b1-prefill: compile [1,n] graph alongside [32,n] (tt-xla #5281)
        PREFILL_BATCH_THRESHOLD: "16"  # route <=16 pending prefills to b1, serially

- weights:
    # gemma-4-31b-it Forge LLM (tensor-parallel) on p300x2/QB2. Lowercase
    # basename matches tt-media-server ModelNames.GEMMA_4_31B_IT. batch-16 / 4K
    # is the best fitting balance (~76 tok/s aggregate). Dims are env-driven here
    # (constants.py only carries the TP mesh topology), mirroring the single-chip
    # forge LLMs above.
    - google/gemma-4-31b-it
  impl: forge_vllm_plugin
  min_disk_gb: 80
  min_ram_gb: 32
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  status: EXPERIMENTAL
  device_model_specs:
    - device: P300X2
      max_concurrency: 16
      max_context: 4096
      # gemma-4-31b-it on P300X2 also has a tt_transformers/vLLM spec (llm.yaml,
      # this model's Model Readiness path); that one is the default impl. Both
      # can't be default_impl or determine_server_type raises "Multiple default
      # impls". This EXPERIMENTAL forge path stays selectable via explicit impl.
      default_impl: false
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "4096"
        MAX_NUM_SEQS: "16"
        GPU_MEMORY_UTILIZATION: "0.9"
        OPTIMIZATION_LEVEL: "0"
        ENABLE_TRACE: "true"
        CPU_SAMPLING: "false"
        # 4-chip (1,4) TP mesh: the runner doesn't auto-set this and the image
        # maps p300x2->p150, so pin the p300_x2 descriptor (else stablehlo
        # "unknown mesh: @mesh" at compile). -e overrides --env-file here.
        TT_MESH_GRAPH_DESC_PATH: "/home/container_app_user/app/server/venv-worker/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal/tt_metal/fabric/mesh_graph_descriptors/p300_x2_mesh_graph_descriptor.textproto"

- weights:
    # Qwen3-32B Forge LLM (tensor-parallel) on p300x2/QB2, mirroring gemma-4-31b.
    # basename "Qwen3-32B" matches ModelNames.QWEN_3_32B. batch-16 / 4K (same as
    # gemma; not yet independently swept on Qwen -- local verify is the check).
    - Qwen/Qwen3-32B
  impl: forge_vllm_plugin
  min_disk_gb: 80
  min_ram_gb: 32
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  status: EXPERIMENTAL
  device_model_specs:
    - device: P300X2
      max_concurrency: 16
      max_context: 4096
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "4096"
        MAX_NUM_SEQS: "16"
        GPU_MEMORY_UTILIZATION: "0.9"
        OPTIMIZATION_LEVEL: "0"
        ENABLE_TRACE: "true"
        CPU_SAMPLING: "false"
        TT_MESH_GRAPH_DESC_PATH: "/home/container_app_user/app/server/venv-worker/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal/tt_metal/fabric/mesh_graph_descriptors/p300_x2_mesh_graph_descriptor.textproto"

- weights:
    # Devstral-2-123B Forge LLM (DP+TP) on the BH Galaxy (32 chips, 4x8 DP+TP
    # mesh), mirroring the gemma-4-31b / Qwen3-32B forge blocks above. Basename
    # "Devstral-2-123B-Instruct-2512" matches ModelNames.DEVSTRAL_2_123B. Validated
    # standalone in tt-xla (branch ssalice/devstral-qwen-wip-07-13-2026, benchmark id
    # "devstral-123b-galaxy-tp"). The DP+TP additional_config keys live in the
    # dedicated runner (tt_model_runners/vllm_forge_devstral_123b.py); this spec
    # carries the served dims + env.
    - mistralai/Devstral-2-123B-Instruct-2512
  impl: forge_vllm_plugin
  min_disk_gb: 300  # TODO(verify): 123B fp8 checkpoint on-disk footprint
  min_ram_gb: 64    # TODO(verify)
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  status: EXPERIMENTAL
  device_model_specs:
    - device: BLACKHOLE_GALAXY
      # max_concurrency = served aggregate batch = 128 (dp-batch128: 4 DP replicas
      # x 32 seqs/replica). max_context = 128 is the ONLY context tt-xla actually
      # validated for this model: the devstral-123b-galaxy-tp benchmark runs at the
      # TT_BENCHMARK_MAX_MODEL_LEN default (128) with NO override, and the DP+TP
      # generation test uses max_model_len=128. This is deliberately the safe
      # first-light value -- b128 x 4096 was never proven and is a prime DRAM-OOM
      # candidate at trace capture (max_num_batched_tokens = ctx*b = 524288, large
      # KV at GMU 0.3). TODO(tune): raise max_context/MAX_MODEL_LENGTH toward model
      # max for real serving/evals, adjusting GPU_MEMORY_UTILIZATION together; an
      # OOM when raising it is a fit problem to tune, NOT a wiring regression.
      max_concurrency: 128
      max_context: 128
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "128"         # validated first-light value; raise for real evals (see above)
        MAX_NUM_SEQS: "128"
        GPU_MEMORY_UTILIZATION: "0.3"   # tt-xla benchmark value (gen-test used 0.1); TODO(tune)
        OPTIMIZATION_LEVEL: "0"
        ENABLE_TRACE: "true"
        CPU_SAMPLING: "true"            # REQUIRED on the 2D DP+TP mesh (tt-inference-server#4440)
        # BH Galaxy runtime: TT_RUNTIME_USING_BH_GALAXY selects the galaxy fabric.
        # The tt-xla standalone run sets only this (no explicit descriptor pin).
        TT_RUNTIME_USING_BH_GALAXY: "1"
        # TODO(verify): a BH-galaxy mesh_graph_descriptor may need pinning in the
        # forge image analogous to gemma's p300_x2 pin (if compile hits
        # "unknown mesh: @mesh"). The in-image path is unknown; leave unset unless
        # that error appears, then set e.g. .../mesh_graph_descriptors/<bh_galaxy_4x8>.textproto
        # TT_MESH_GRAPH_DESC_PATH: "..."

