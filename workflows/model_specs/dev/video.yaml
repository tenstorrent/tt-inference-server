    TT_DIT_CACHE_DIR: /home/container_app_user/cache_root/tt_dit_cache
  device_model_specs:
    - device: GALAXY
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
  status: FUNCTIONAL

