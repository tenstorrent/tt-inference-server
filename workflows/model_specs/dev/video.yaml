# Wan2.2 I2V variants share the base I2V weights, so hf_weights_repo points at the real download repo
# while the distinct product name in `weights` becomes the resolvable
# model_name
- weights:
    - Wan-AI/Wan2.2-I2V-A14B-Prodia
  impl: tt_transformers
  min_disk_gb: 60
  min_ram_gb: 32
  model_type: VIDEO
  inference_engine: MEDIA
  hf_weights_repo: Wan-AI/Wan2.2-I2V-A14B-Diffusers
