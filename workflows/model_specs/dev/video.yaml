# Model spec catalog: Video templates.
# Edit this file to add or modify a Video model spec.
# Schema: workflows/model_spec.py (ModelSpecTemplate, DeviceModelSpec).
templates:
# =============================================================================
# Video templates
# =============================================================================
- weights:
    - genmo/mochi-1-preview
  impl: tt_transformers
  min_disk_gb: 60
  min_ram_gb: 32
  model_type: VIDEO
  inference_engine: MEDIA
  env_vars:
    TT_DIT_CACHE_DIR: /home/container_app_user/cache_root/tt_dit_cache
  device_model_specs:
    - device: T3K
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
    - device: GALAXY
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
    - device: BLACKHOLE_GALAXY
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
    - device: P150X4
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
      override_tt_config:
        trace_region_size: 30000000
    - device: P150X8
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
      override_tt_config:
        trace_region_size: 30000000
    - device: P300X2
      max_concurrency: 1
      max_context: 65536  # 64 * 1024
      default_impl: true
      override_tt_config:
        trace_region_size: 30000000
  status: COMPLETE

