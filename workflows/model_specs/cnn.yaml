- weights:
    - tiiuae/Falcon3-7B-Instruct
  tt_metal_commit: "2496be4"
  impl: forge_vllm_plugin
  min_disk_gb: 20
  min_ram_gb: 12
  docker_image: "ghcr.io/tenstorrent/tt-shield/tt-media-inference-server-forge:709c6a767e00ee7f2803e20851193ac0d6aaff3b_e0b9595_75385194349"
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  device_model_specs:
    - device: P150
      # max_concurrency=4 matches MAX_NUM_SEQS so lm-eval can run batch=4
      # client-side. max_context=16K so eval prompts + benchmark long-context
      # configs fit `prompt + max_gen_toks`; pool fits 4 concurrent 16K
      # sequences with 1.03x slack (67,392-token pool / 16K = 4.11x ratio,
      # tightest of the five forge LLMs). TT_KV_POOL_GB=12 (not 16) here
      # because Falcon3-7B's trace-capture scratch fragments HBM at pool=16,
      # OOM-ing with `largest free block < required allocation`. 12 leaves
      # enough headroom for the trace allocator.
      max_concurrency: 4
      max_context: 16384
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "16384"
        MAX_NUM_SEQS: "4"
        GPU_MEMORY_UTILIZATION: "0.6"
        TT_KV_POOL_GB: "12"

