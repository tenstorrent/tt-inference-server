- weights:
    - tiiuae/Falcon3-7B-Instruct
  tt_metal_commit: "2496be4"
  impl: forge_vllm_plugin
  min_disk_gb: 20
  min_ram_gb: 12
  docker_image: "ghcr.io/tenstorrent/tt-shield/tt-media-inference-server-forge:709c6a767e00ee7f2803e20851193ac0d6aaff3b_e0b9595_75385194349"
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  device_model_specs:
    - device: P150
      # Single-user serving so eval prompts + benchmark long-context configs
      # at 16K fit `prompt + max_gen_toks`. TT_KV_POOL_GB lifts the forge
      # wheel's 12 GB hardcode (peer commit 8ab810b6). Falcon3-7B uses a
      # smaller pool (12 vs 16) because its trace-capture scratch fragments
      # HBM at TT_KV_POOL_GB=16, causing OOM with `largest free block <
      # required allocation`. 12 leaves enough headroom for trace allocator.
      max_concurrency: 1
      max_context: 16384
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "16384"
        MAX_NUM_SEQS: "4"
        GPU_MEMORY_UTILIZATION: "0.6"
        TT_KV_POOL_GB: "12"

