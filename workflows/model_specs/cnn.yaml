# Model spec catalog: CNN templates.
# Edit this file to add or modify a CNN model spec.
# Schema: workflows/model_spec.py (ModelSpecTemplate, DeviceModelSpec).
templates:
# =============================================================================
# CNN templates
# =============================================================================
- weights:
    - Qwen/Qwen3-4B
  tt_metal_commit: "2496be4"
  impl: forge_vllm_plugin
  min_disk_gb: 15
  min_ram_gb: 8
  docker_image: "ghcr.io/tenstorrent/tt-shield/tt-media-inference-server-forge:709c6a767e00ee7f2803e20851193ac0d6aaff3b_e0b9595_75385194349"
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  device_model_specs:
    - device: P150
      # max_concurrency=4 matches MAX_NUM_SEQS so lm-eval can run client-side
      # batch=4 (recovers throughput on slow forge tasks like EVALS_META).
      # max_context=16K gives reasoning evals (mmlu_pro, r1_gpqa_diamond) real
      # headroom on prompt+max_gen_toks; the KV pool fits 4 concurrent 16K
      # sequences with 1.24x slack (81,536-token pool / 16K = 4.98x ratio) so
      # no preemption at saturation. TT_KV_POOL_GB lifts the forge wheel's
      # 12 GB hardcode (peer cnn.yaml commit 8ab810b6 patches vllm_tt/worker.py:236).
      max_concurrency: 4
      max_context: 16384
      default_impl: true
      eval_max_retries: 1
      env_vars:
        MAX_MODEL_LENGTH: "16384"
        MAX_NUM_SEQS: "4"
        GPU_MEMORY_UTILIZATION: "0.7"
        TT_KV_POOL_GB: "16"

