      max_context: 65536  # 64 * 1024
      default_impl: true
      env_vars:
        TT_MESH_GRAPH_DESC_PATH: "../../tt-metal/tt_metal/fabric/mesh_graph_descriptors/p300_x2_mesh_graph_descriptor.textproto"
  status: COMPLETE

