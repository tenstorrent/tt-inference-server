- weights:
    # NOTE: basename MUST be lowercase "gemma-4-31b-it" so model_name matches the
    # tt-media-server ModelNames.GEMMA_4_31B_IT enum value ("gemma-4-31b-it").
    # ModelNames(MODEL) is an exact (case-sensitive) lookup; an uppercase "B"
    # here would raise ValueError on the server. The container loads the real
    # weights repo ("google/gemma-4-31B-it") internally from its constants, so
    # this lowercase repo string is only used host-side for naming (no host-side
    # HF download happens without --host-volume/--host-hf-cache/--host-weights-dir).
    - google/gemma-4-31b-it
  tt_metal_commit: "e03b231b1de926cd8f9a0e1a2d39dd1df599f7a7"
  vllm_commit: "46a7c96"
  impl: forge_vllm_plugin
  min_disk_gb: 80
  min_ram_gb: 32
  docker_image: "ghcr.io/tenstorrent/tt-shield/tt-media-inference-server-forge:e03b231b1de926cd8f9a0e1a2d39dd1df599f7a7_46a7c96_79778041239"
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  status: EXPERIMENTAL
  device_model_specs:
    # 4096 seq len, concurrency 16 (best fitting balance measured on p300x2,
    # ~76 tok/s aggregate; see PERF_gemma4_31b_it_forge.md). The tt-media-server
    # pins (VLLMForge_GEMMA4_31B, P300X2) to max_model_length=4096,
    # max_num_seqs=16, max_num_batched_tokens=65536, gpu_memory_utilization=0.9,
    # mesh (1,4) across all 4 chips, so no env_vars override is needed here —
    # these values are informational/host-side and mirror that config.
    - device: P300X2
      max_concurrency: 16
      max_context: 4096
      default_impl: true
      env_vars:
        # 4-chip (1,4) tensor-parallel mesh. The gemma runner does NOT auto-set
        # TT_MESH_GRAPH_DESC_PATH (only whisper/tts do), so without this it falls
        # back to whatever is in the host .env -- which on QB2 is often pinned to
        # the single-chip p150 descriptor (a Qwen3-4B workaround leftover). A
        # 1-chip mesh can't satisfy the (1,4) sharded @mesh, producing
        # "stablehlo ... unknown mesh: @mesh" at compile. Pin the p300_x2
        # descriptor here; this -e value overrides --env-file for this model only.
        TT_MESH_GRAPH_DESC_PATH: "/home/container_app_user/app/server/venv-worker/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal/tt_metal/fabric/mesh_graph_descriptors/p300_x2_mesh_graph_descriptor.textproto"

- weights:
    # Qwen3-32B as a Forge LLM (tensor-parallel), mirroring the gemma-4-31b-it
    # setup. basename "Qwen3-32B" matches tt-media-server ModelNames.QWEN_3_32B.
    # Requires a forge image built from a tt-media-server that includes the
    # VLLMForge_QWEN_32B runner (added in this repo's tt-media-server) — the
    # prebuilt gemma image (97aea20...) does NOT contain it. See HANDOFF.
    - Qwen/Qwen3-32B
  tt_metal_commit: "e03b231b1de926cd8f9a0e1a2d39dd1df599f7a7"
  vllm_commit: "46a7c96"
  impl: forge_vllm_plugin
  min_disk_gb: 80
  min_ram_gb: 32
  docker_image: "ghcr.io/tenstorrent/tt-shield/tt-media-inference-server-forge:e03b231b1de926cd8f9a0e1a2d39dd1df599f7a7_46a7c96_79778041239"
  model_type: LLM
  inference_engine: FORGE
  uses_tensor_model_cache: false
  status: EXPERIMENTAL
  device_model_specs:
    # 4-chip (1,4) tensor-parallel mesh, 4096 seq len / concurrency 16 (mirrors
    # gemma-4-31b). Server-side config lives in tt-media-server
    # (VLLMForge_QWEN_32B, P300X2): max_model_length=4096, max_num_seqs=16,
    # max_num_batched_tokens=65536, gpu_memory_utilization=0.9. Same p300_x2
    # mesh-descriptor override as gemma (the runner doesn't auto-set it and the
    # image maps p300x2->p150).
    - device: P300X2
      max_concurrency: 16
      max_context: 4096
      default_impl: true
      env_vars:
        TT_MESH_GRAPH_DESC_PATH: "/home/container_app_user/app/server/venv-worker/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal/tt_metal/fabric/mesh_graph_descriptors/p300_x2_mesh_graph_descriptor.textproto"

