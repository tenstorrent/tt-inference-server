# Model spec catalog: VLM templates.
# Edit this file to add or modify a VLM model spec.
# Schema: workflows/model_spec.py (ModelSpecTemplate, DeviceModelSpec).
templates:
# =============================================================================
# VLM templates
# =============================================================================
- weights:
    - google/gemma-3-4b-it
    - google/medgemma-4b-it
  impl: tt_transformers
  version: "0.9.0"
  tt_metal_commit: c254ee3
  vllm_commit: c4f2327
  inference_engine: VLLM
  device_model_specs:
    - device: N150
      max_concurrency: 32
      max_context: 131072  # 128 * 1024
      default_impl: true
      vllm_args:
        limit-mm-per-prompt: '{"image": 10}'
        mm-processor-cache-gb: 0
      override_tt_config:
        l1_small_size: 4096
        fabric_config: FABRIC_1D
    - device: N300
      max_concurrency: 32
      max_context: 131072  # 128 * 1024
      default_impl: true
      vllm_args:
        limit-mm-per-prompt: '{"image": 10}'
        mm-processor-cache-gb: 0
      override_tt_config:
        l1_small_size: 4096
        fabric_config: FABRIC_1D
  model_type: VLM
  status: EXPERIMENTAL
  supported_modalities:
    - text
    - image
  has_builtin_warmup: true

- weights:
    - google/gemma-3-27b-it
    - google/medgemma-27b-it
  impl: tt_transformers
  version: "0.9.0"
  tt_metal_commit: 0b10c51
  vllm_commit: 3499ffa
  inference_engine: VLLM
  device_model_specs:
    - device: T3K
      max_concurrency: 32
      max_context: 131072  # 128 * 1024
      default_impl: true
      vllm_args:
        limit-mm-per-prompt: '{"image": 10}'
        mm-processor-cache-gb: 0
      override_tt_config:
        l1_small_size: 4096
        fabric_config: FABRIC_1D
        sample_on_device_mode: decode_only
    - device: GALAXY_T3K
      max_concurrency: 32
      max_context: 131072  # 128 * 1024
      default_impl: true
      env_vars:
        TT_MM_THROTTLE_PERF: 5
        TT_MESH_GRAPH_DESC_PATH: "../../tt-metal/tt_metal/fabric/mesh_graph_descriptors/t3k_mesh_graph_descriptor.textproto"
      vllm_args:
        limit-mm-per-prompt: '{"image": 10}'
        mm-processor-cache-gb: 0
      override_tt_config:
        l1_small_size: 4096
        fabric_config: FABRIC_1D
        sample_on_device_mode: decode_only
    - device: GALAXY
      max_concurrency: 32  # 8 * 4
      max_context: 131072  # 128 * 1024
      default_impl: true
      env_vars:
        TT_MM_THROTTLE_PERF: 5
      vllm_args:
        limit-mm-per-prompt: '{"image": 10}'
        data_parallel_size: 4
        mm-processor-cache-gb: 0
      override_tt_config:
        l1_small_size: 4096
        fabric_config: FABRIC_1D_RING
        sample_on_device_mode: decode_only
  model_type: VLM
  status: EXPERIMENTAL
  supported_modalities:
    - text
    - image
  has_builtin_warmup: true

