# ---------------------------------------------------------------------------
# Hardware target
# ---------------------------------------------------------------------------

[hardware]
card         = "bh_p150"
tensix_cores = 120
l1_budget_bytes = 1_440_000
pcie_gen     = 5
device_ids   = [0]
notes        = "Single Blackhole p150. Multi-card support tracked in #17."
