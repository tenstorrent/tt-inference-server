[[model]]
name              = "EleutherAI/pythia-2.8b"
arch              = "GPTNeoXForCausalLM"
local_path        = "models/EleutherAI-pythia-2.8b"
hidden_size       = 2560
intermediate_size = 10240
n_layers          = 32
