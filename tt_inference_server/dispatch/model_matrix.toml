# model_matrix.toml — Runtime dispatch config
# Maps model architecture family → kernel variant → hardware grid assignment.
# Resolved once at load_model() time by KernelDispatcher.
#
# Schema:
#   [models.<family>]
#   arch         = "HuggingFace architecture class name"
#   kernel       = "flash_attn variant tag (matches kernels/manifest.json)"
#   grid_x       = Tensix core grid width
#   grid_y       = Tensix core grid height (always 1 for current kernels)
#   status       = "passing" | "failing" | "untested"
#   issue        = GitHub issue number (optional — for known bugs)
#   notes        = free-text notes (optional)

# ---------------------------------------------------------------------------
# Llama 3 family (Meta)
# ---------------------------------------------------------------------------

[models.llama3-8b]
arch         = "LlamaForCausalLM"
kernel       = "flash_attn__N32_Nkv8_hd4_kv1"
grid_x       = 32
grid_y       = 1
status       = "passing"
notes        = "Baseline model. 32 Q-heads, 8 KV-heads, head_dim=128 (4 tiles)."

[models.llama3-70b]
arch         = "LlamaForCausalLM"
kernel       = "flash_attn__N64_Nkv8_hd4_kv1"
grid_x       = 64
grid_y       = 1
status       = "untested"
notes        = "70B variant — exceeds single-card DRAM; multi-card work tracked in #17."

